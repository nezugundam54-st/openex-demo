<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>契約内容確認 - OPEN EX</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'Hiragino Kaku Gothic ProN','Meiryo',sans-serif; background:#f0f4f7; color:#333; height:100vh; display:flex; flex-direction:column; }
    .header { background:#fff; border-bottom:1px solid #e0e0e0; padding:10px 24px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
    .breadcrumb { font-size:12px; color:#999; display:flex; align-items:center; gap:6px; }
    .breadcrumb a { color:#1d6ed1; cursor:pointer; text-decoration:none; }
    .page-title { font-size:16px; font-weight:700; margin-top:4px; }
    .header-btns { display:flex; gap:10px; }
    .btn-primary { background:#1d6ed1; color:#fff; border:none; border-radius:5px; padding:8px 20px; font-size:13px; font-weight:600; font-family:inherit; cursor:pointer; display:flex; align-items:center; gap:6px; }
    .btn-primary:hover { background:#1558b0; }
    .main-wrap { display:flex; flex:1; overflow:hidden; }
    .preview-area { flex:1; overflow:auto; padding:24px; display:flex; justify-content:center; align-items:flex-start; background:#e8edf3; }
    .preview-paper { background:#fff; width:794px; min-height:1123px; box-shadow:0 2px 12px rgba(0,0,0,.12); padding:60px 70px; }
    .preview-title { font-size:26px; font-weight:700; text-align:center; margin-bottom:32px; letter-spacing:6px; }
    .preview-intro { font-size:12px; margin-bottom:28px; line-height:1.8; }
    .section-head { font-weight:700; font-size:12px; margin-bottom:6px; padding-bottom:3px; border-bottom:2px solid #333; }
    .preview-row { display:grid; grid-template-columns:120px 1fr; gap:8px; align-items:center; margin-bottom:8px; }
    .preview-row-label { font-size:12px; color:#333; letter-spacing:1px; }
    .preview-row-value { font-size:12px; border-bottom:1px solid #333; padding:4px 0; min-height:22px; }
    .preview-section { margin-bottom:20px; }
    .amount-row { display:grid; grid-template-columns:160px 1fr 40px; gap:8px; align-items:center; margin-bottom:6px; }
    .amount-label { font-size:12px; letter-spacing:1px; }
    .amount-val { text-align:right; border-bottom:1px solid #333; padding:4px 8px; font-size:12px; }
    .attach-panel { width:300px; flex-shrink:0; background:#fff; border-left:1px solid #e0e0e0; display:flex; flex-direction:column; }
    .attach-panel-header { padding:14px 16px 10px; border-bottom:1px solid #eee; }
    .attach-panel-title { font-size:14px; font-weight:700; margin-bottom:3px; }
    .attach-select-hint { font-size:12px; color:#888; }
    .attach-table-wrap { flex:1; overflow-y:auto; }
    .attach-table { width:100%; border-collapse:collapse; }
    .attach-table th { font-size:11px; color:#bbb; font-weight:400; padding:6px 12px; border-bottom:1px solid #eee; text-align:left; }
    .attach-table td { padding:10px 12px; border-bottom:1px dashed #eee; font-size:12px; vertical-align:middle; }
    .footer { background:#fff; border-top:1px solid #e0e0e0; padding:12px 24px; text-align:center; flex-shrink:0; }
    .btn-close { background:#fff; border:1px solid #ccc; border-radius:5px; padding:8px 32px; font-size:13px; font-family:inherit; cursor:pointer; color:#555; }
    .save-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:1000; justify-content:center; align-items:center; }
    .save-overlay.active { display:flex; }
    .save-modal { background:#fff; border-radius:8px; width:320px; overflow:hidden; box-shadow:0 4px 20px rgba(0,0,0,.18); }
    .save-modal-header { padding:16px 20px 14px; border-bottom:1px solid #eee; font-size:15px; font-weight:700; }
    .save-option { display:flex; align-items:center; gap:12px; padding:14px 20px; cursor:pointer; font-size:14px; }
    .save-option:hover { background:#f5f5f5; }
    .save-option i { width:20px; color:#1d6ed1; }
    .save-modal-footer { padding:12px 20px; border-top:1px solid #eee; text-align:right; }
    .btn-modal-cancel { background:#fff; border:1px solid #ddd; border-radius:5px; padding:7px 20px; font-size:13px; font-family:inherit; cursor:pointer; }
    @media print {
      .header,.footer,.attach-panel,.save-overlay { display:none!important; }
      .main-wrap { display:block; }
      .preview-area { padding:0; background:#fff; }
      .preview-paper { box-shadow:none; width:100%; min-height:auto; }
    }
  </style>
</head>
<body>
<div class="header">
  <div>
    <div class="breadcrumb">
      <a onclick="history.back()">契約管理</a><span>›</span>
      <span id="bcProp">—</span><span>›</span><span>契約内容確認</span>
    </div>
    <div class="page-title">契約内容確認</div>
  </div>
  <div class="header-btns">
    <button class="btn-primary" onclick="openSaveModal()"><i class="fa-solid fa-floppy-disk"></i> 契約書類保存</button>
    <button class="btn-primary" onclick="printContract()"><i class="fa-solid fa-print"></i> 契約書印刷</button>
  </div>
</div>

<div class="main-wrap">
  <div class="preview-area">
    <div class="preview-paper">
      <div class="preview-title">工事請負契約書</div>
      <div class="preview-intro">下記のとおり請負契約を締結し、その証として本書２通を作成し、各自１通を保有する。</div>

      <div class="preview-section">
        <div class="section-head">■ 契約年月日</div>
        <div class="preview-row"><div class="preview-row-label">契約年月日</div><div class="preview-row-value" id="pvDate"></div></div>
      </div>
      <div class="preview-section">
        <div class="section-head">■ 物件名</div>
        <div class="preview-row"><div class="preview-row-label">物　件　名</div><div class="preview-row-value" id="pvPropName"></div></div>
      </div>
      <div class="preview-section">
        <div class="section-head">■ 工事場所</div>
        <div class="preview-row"><div class="preview-row-label">工 事 場 所</div><div class="preview-row-value" id="pvAddr"></div></div>
      </div>
      <div class="preview-section">
        <div class="section-head">■ 工　期</div>
        <div class="preview-row"><div class="preview-row-label">着　工　日</div><div class="preview-row-value" id="pvStart"></div></div>
        <div class="preview-row"><div class="preview-row-label">完　成　日</div><div class="preview-row-value" id="pvEnd"></div></div>
      </div>
      <div class="preview-section">
        <div class="section-head">■ 請負代金</div>
        <div class="amount-row"><div class="amount-label">工事本体価格</div><div class="amount-val" id="pvAmountEx"></div><div style="font-size:12px;">円</div></div>
        <div class="amount-row"><div class="amount-label">消費税（10%）</div><div class="amount-val" id="pvTax"></div><div style="font-size:12px;">円</div></div>
        <div class="amount-row"><div class="amount-label" style="font-weight:700;">合　計（税込）</div><div class="amount-val" id="pvAmountTax" style="font-weight:700;"></div><div style="font-size:12px;">円</div></div>
      </div>
      <div class="preview-section">
        <div class="section-head">■ 注文者（甲）</div>
        <div class="preview-row"><div class="preview-row-label">住　　所</div><div class="preview-row-value" id="pvCustAddr"></div></div>
        <div class="preview-row"><div class="preview-row-label">氏　　名</div><div class="preview-row-value" style="display:flex;justify-content:space-between;"><span id="pvCustName"></span><span>㊞</span></div></div>
      </div>
      <div class="preview-section">
        <div class="section-head">■ 請負者（乙）</div>
        <div class="preview-row"><div class="preview-row-label">住　　所</div><div class="preview-row-value" id="pvCoAddr"></div></div>
        <div class="preview-row"><div class="preview-row-label">会 社 名</div><div class="preview-row-value" id="pvCoName"></div></div>
        <div class="preview-row"><div class="preview-row-label">代 表 者</div><div class="preview-row-value" style="display:flex;justify-content:space-between;"><span id="pvCoRep"></span><span>㊞</span></div></div>
      </div>
      <div class="preview-section">
        <div class="section-head">■ 備　考</div>
        <div class="preview-row-value" id="pvNote" style="min-height:60px;"></div>
      </div>
    </div>
  </div>

  <div class="attach-panel">
    <div class="attach-panel-header">
      <div class="attach-panel-title">添付ファイル</div>
      <div class="attach-select-hint">添付ファイルを選択する</div>
    </div>
    <div class="attach-table-wrap">
      <table class="attach-table">
        <thead><tr><th style="width:40px;">添付</th><th>ファイル名</th></tr></thead>
        <tbody id="attachTbody">
          <tr><td colspan="2" style="text-align:center;padding:24px;color:#bbb;font-size:12px;">設定なし</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<div class="footer">
  <button class="btn-close" onclick="history.back()">閉じる</button>
</div>

<div class="save-overlay" id="saveModal">
  <div class="save-modal">
    <div class="save-modal-header">保存方法を選択</div>
    <div>
      <div class="save-option" onclick="saveLocal()"><i class="fa-solid fa-download"></i><span>ローカルに保存</span></div>
      <div class="save-option" onclick="saveOpenEX()"><i class="fa-solid fa-cloud-arrow-up"></i><span>OPEN EXに保存</span></div>
    </div>
    <div class="save-modal-footer"><button class="btn-modal-cancel" onclick="closeSaveModal()">キャンセル</button></div>
  </div>
</div>

const p = new URLSearchParams(location.search);
const PROPERTY_ID = p.get('property_id') || '';
const CONTRACT_ID = p.get('contract_id') || '';

let C={}, PROP={}, CUST={}, CO={};

function fmtNum(n) { return n!=null ? Number(n).toLocaleString('ja-JP') : ''; }
function fmtDate(s) {
  if(!s) return '';
  const d = new Date(s);
  return d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日';
}
function el(id) { return document.getElementById(id); }

(async function init() {
  try {
    if(CONTRACT_ID) {
      const r = await fetch(`${API}/contracts?id=eq.${CONTRACT_ID}`,{headers:H});
      C = (await r.json())[0] || {};
    }
    if(PROPERTY_ID) {
      const r = await fetch(`${API}/properties?id=eq.${PROPERTY_ID}`,{headers:H});
      PROP = (await r.json())[0] || {};
      el('bcProp').textContent = PROP.name || '—';
    }
    if(PROP.customer_id) {
      const r = await fetch(`${API}/customers?id=eq.${PROP.customer_id}`,{headers:H});
      CUST = (await r.json())[0] || {};
    }
    const cr = await fetch(`${API}/company_info?limit=1`,{headers:H});
    CO = ((await cr.json())[0]) || {};
    const ar = await fetch(`${API}/contract_attachments?order=sort_order.asc`,{headers:H});
    const attachments = ar.ok ? await ar.json() : [];
    renderPreview();
    renderAttach(attachments);
  } catch(e) { console.error(e); }
})();

function renderPreview() {
  el('pvDate').textContent       = C.contract_date     ? fmtDate(C.contract_date)     : '';
  el('pvPropName').textContent   = PROP.name            || '';
  el('pvAddr').textContent       = PROP.address         || '';
  el('pvStart').textContent      = C.scheduled_start    ? fmtDate(C.scheduled_start)+'（予定）' : '';
  el('pvEnd').textContent        = C.scheduled_end      ? fmtDate(C.scheduled_end)+'（予定）'   : '';
  el('pvAmountEx').textContent   = fmtNum(C.invoice_amount);
  el('pvTax').textContent        = fmtNum(C.tax_amount);
  el('pvAmountTax').textContent  = fmtNum(C.invoice_amount_tax);
  el('pvCustAddr').textContent   = CUST.address || '';
  el('pvCustName').textContent   = CUST.name    || '';
  const addr = [CO.prefecture,CO.address1,CO.address2,CO.address3].filter(Boolean).join('');
  el('pvCoAddr').textContent = addr;
  el('pvCoName').textContent = CO.name  || '';
  el('pvCoRep').textContent  = '';
  el('pvNote').textContent   = C.note   || '';
}

function renderAttach(attachments) {
  const tbody = el('attachTbody');
  if(!attachments.length) { tbody.innerHTML='<tr><td colspan="2" style="text-align:center;padding:24px;color:#bbb;font-size:12px;">設定なし</td></tr>'; return; }
  tbody.innerHTML = attachments.map(a=>`
    <tr>
      <td style="text-align:center;"><input type="checkbox" checked data-path="${a.file_path||''}"></td>
      <td style="font-size:13px;">${a.name||'—'}</td>
    </tr>`).join('');
}

function printContract() { window.print(); }
function openSaveModal()  { el('saveModal').classList.add('active'); }
function closeSaveModal() { el('saveModal').classList.remove('active'); }

function saveLocal() {
  closeSaveModal();
  exportExcel();
}
function saveOpenEX() {
  closeSaveModal();
  alert('OPEN EXへの保存機能は準備中です。');
}

function exportExcel() {
  const binary = atob(TEMPLATE_B64);
  const buf = new Uint8Array(binary.length);
  for(let i=0;i<binary.length;i++) buf[i]=binary.charCodeAt(i);
  const wb = XLSX.read(buf,{type:'array'});
  const ws = wb.Sheets['請負契約書'];

  const set=(cell,val)=>{
    if(!ws[cell]) ws[cell]={t:'s',v:''};
    ws[cell].v = val!=null ? String(val) : '';
    ws[cell].t = 's';
  };

  set('B9',  C.contract_date   ? fmtDate(C.contract_date)   : '');
  set('B12', PROP.name         || '');
  set('B15', PROP.address      || '');
  set('B19', C.scheduled_start ? fmtDate(C.scheduled_start)+'（予定）' : '');
  set('B20', C.scheduled_end   ? fmtDate(C.scheduled_end)+'（予定）'   : '');
  if(C.invoice_amount!=null)     ws['C23']={t:'n',v:C.invoice_amount,    z:'#,##0'};
  if(C.tax_amount!=null)         ws['C24']={t:'n',v:C.tax_amount,        z:'#,##0'};
  if(C.invoice_amount_tax!=null) ws['C25']={t:'n',v:C.invoice_amount_tax,z:'#,##0'};
  set('B28', CUST.address || '');
  set('B29', CUST.name    || '');
  const coAddr=[CO.prefecture,CO.address1,CO.address2,CO.address3].filter(Boolean).join('');
  set('B32', coAddr);
  set('B33', CO.name || '');

  const fname = `工事請負契約書_${PROP.name||''}_${C.contract_date||''}.xlsx`;
  XLSX.writeFile(wb,fname);
}
</script>
