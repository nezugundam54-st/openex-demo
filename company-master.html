  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Sans JP', sans-serif; background: #f0f2f5; color: #333; min-height: 100vh; }

    .navbar {

      cursor: pointer; text-decoration: none; white-space: nowrap;

    .nav-item:hover { color: #1a6fc4; }
    .nav-item.active { color: #1a6fc4; border-bottom-color: #1a6fc4; font-weight: 600; }
    .nav-item svg { flex-shrink: 0; width: 14px; height: 14px; }
    .nav-badge {
      display: inline-flex; align-items: center; justify-content: center;

    .master-card { background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); padding: 24px; margin-bottom: 16px; }

    .company-list { list-style: none; }

    /* 各行 */

    .btn-secondary {

function showToast(msg, type = '') {

// ========== 画像処理 ==========
function fileToBase64(file) {
  return new Promise((res, rej) => {
    const reader = new FileReader();
    reader.onload = e => res(e.target.result);
    reader.onerror = () => rej(new Error('読み込み失敗'));
    reader.readAsDataURL(file);
  });
}
function resizeImage(dataUrl, maxSize = 400) {
  return new Promise(res => {
    const img = new Image();
    img.onload = () => {
      let w = img.width, h = img.height;
      if (w > maxSize || h > maxSize) {
        if (w > h) { h = Math.round(h * maxSize / w); w = maxSize; }
        else { w = Math.round(w * maxSize / h); h = maxSize; }
      }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      res(canvas.toDataURL('image/jpeg', 0.85));
    };
    img.src = dataUrl;
  });
}

// ========== ロゴエリア初期化 ==========
function initLogoArea(areaEl, previewEl, fileInputEl, removeBtnEl, onChanged) {
  if (!areaEl) return { getValue: () => null, setValue: () => {} };
  let current = null;

  function setImage(base64) {
    current = base64;
    if (base64) {
      previewEl.src = base64;
      areaEl.classList.add('has-image');
    } else {
      previewEl.src = '';
      areaEl.classList.remove('has-image');
    }
    onChanged(current);
  }

  fileInputEl.addEventListener('change', async e => {
    const file = e.target.files[0];
    if (!file) return;
    const resized = await resizeImage(await fileToBase64(file));
    setImage(resized);
    fileInputEl.value = '';
  });

  areaEl.addEventListener('dragover', e => { e.preventDefault(); e.stopPropagation(); areaEl.classList.add('dragover'); });
  areaEl.addEventListener('dragleave', e => { e.stopPropagation(); areaEl.classList.remove('dragover'); });
  areaEl.addEventListener('drop', async e => {
    e.preventDefault(); e.stopPropagation();
    areaEl.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (!file || !file.type.startsWith('image/')) return;
    const resized = await resizeImage(await fileToBase64(file));
    setImage(resized);
  });

  removeBtnEl.addEventListener('click', e => { e.stopPropagation(); setImage(null); });

  return {
    getValue: () => current,
    setValue: v => setImage(v || null)
  };
}

// 追加フォームのロゴ
const addLogoCtrl = initLogoArea(
  $('addLogoArea'), $('addLogoPreview'), $('addLogoFile'), $('addLogoRemove'),
  v => { addLogoValue = v; }
);

// ========== レンダリング ==========
function render() {
  const list = $('companyList');
  if (companies.length === 0) {
    list.innerHTML = `<div class="empty-state">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>
      まだ会社が登録されていません</div>`;
    return;
  }
  list.innerHTML = companies.map((c, i) => `
    <li class="company-item${editingId === c.id ? ' editing' : ''}" data-index="${i}" data-id="${c.id}">
      <div class="company-item-view" draggable="true">
        <span class="drag-handle"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="8" y1="18" x2="16" y2="18"/></svg></span>
        <div class="logo-display">
          ${c.logo_base64 ? `<img src="${esc(c.logo_base64)}" alt="ロゴ">` : '<span>NO<br>LOGO</span>'}
        </div>
        <div class="company-info">
          <div class="company-name-text">${esc(c.name)}</div>
          <div class="company-meta">
            ${c.address ? `<span class="meta-address"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>${esc(c.address)}</span>` : ''}
            ${c.tel ? `<span class="meta-tel"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 2.18h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 9.91a16 16 0 0 0 6.06 6.06l.91-.91a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 21.73 17z"/></svg>${esc(c.tel)}</span>` : ''}
            ${c.fax ? `<span class="meta-tel"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 3h2a2 2 0 0 1 2 2v2"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="8" y1="16" x2="12" y2="16"/></svg>FAX: ${esc(c.fax)}</span>` : ''}
            ${c.email ? `<span class="meta-person"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>${esc(c.email)}</span>` : ''}
            ${c.representative ? `<span class="meta-person"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>${c.representative_title ? esc(c.representative_title) + '　' : ''}${esc(c.representative)}</span>` : ''}
          </div>
        </div>
        <div class="item-actions">
          <button class="item-action-btn edit" onclick="openInlineEdit('${c.id}')" title="編集">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
          <button class="item-action-btn delete" onclick="handleDelete('${c.id}')" title="削除">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
          </button>
        </div>
      </div>
      <!-- インライン編集 -->
      <div class="company-item-edit${editingId === c.id ? ' open' : ''}" id="edit-${c.id}">
        <div class="edit-layout">
          <div class="logo-upload-area${c.logo_base64 ? ' has-image' : ''}" id="editLogoArea-${c.id}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
            <span class="logo-hint">ロゴ画像<br>ドラッグまたは<br>クリック</span>
            <img class="logo-preview-img" id="editLogoPreview-${c.id}" src="${c.logo_base64 ? esc(c.logo_base64) : ''}" alt="">
            <button class="logo-remove-btn" id="editLogoRemove-${c.id}" type="button">×</button>
            <input type="file" id="editLogoFile-${c.id}" accept="image/*">
          </div>
          <div class="edit-fields">
            <div class="edit-field-full">
              <label class="edit-label">会社名<span class="req">*</span></label>
              <input type="text" class="edit-input" id="editName-${c.id}" value="${esc(c.name)}">
            </div>
            <div class="edit-field-full">
              <label class="edit-label">住所</label>
              <input type="text" class="edit-input" id="editAddress-${c.id}" value="${esc(c.address||'')}">
            </div>
            <div>
              <label class="edit-label">電話番号</label>
              <input type="text" class="edit-input" id="editTel-${c.id}" value="${esc(c.tel||'')}">
            </div>
            <div>
              <label class="edit-label">FAX番号</label>
              <input type="text" class="edit-input" id="editFax-${c.id}" value="${esc(c.fax||'')}">
            </div>
            <div class="edit-field-full">
              <label class="edit-label">Emailアドレス</label>
              <input type="email" class="edit-input" id="editEmail-${c.id}" value="${esc(c.email||'')}">
            </div>
            <div>
              <label class="edit-label">役職名</label>
              <input type="text" class="edit-input" id="editTitle-${c.id}" value="${esc(c.representative_title||'')}">
            </div>
            <div>
              <label class="edit-label">代表者名</label>
              <input type="text" class="edit-input" id="editPerson-${c.id}" value="${esc(c.representative||'')}">
            </div>
          </div>
        </div>
        <div class="edit-actions">
          <button class="btn-secondary" onclick="closeInlineEdit('${c.id}')">キャンセル</button>
          <button class="btn-primary" onclick="saveInlineEdit('${c.id}')">保存</button>
        </div>
      </div>
    </li>
  `).join('');

  // ドラッグイベント登録
  list.querySelectorAll('.company-item').forEach(item => {
    const viewRow = item.querySelector('.company-item-view');
    viewRow.addEventListener('dragstart', e => {
      dragSrcIndex = parseInt(item.dataset.index);
      item.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    viewRow.addEventListener('dragover', e => { e.preventDefault(); item.classList.add('drag-over'); });
    viewRow.addEventListener('dragleave', () => item.classList.remove('drag-over'));
    viewRow.addEventListener('drop', e => {
      e.preventDefault();
      const ti = parseInt(item.dataset.index);
      if (dragSrcIndex !== null && dragSrcIndex !== ti) {
        const moved = companies.splice(dragSrcIndex, 1)[0];
        companies.splice(ti, 0, moved);
        render();
      }
      item.classList.remove('drag-over');
    });
    viewRow.addEventListener('dragend', () => { item.classList.remove('dragging'); dragSrcIndex = null; });
  });

  // 編集ロゴエリア初期化
  companies.forEach(c => {
    editLogoValues[c.id] = c.logo_base64 || null;
    initLogoArea(
      $(`editLogoArea-${c.id}`), $(`editLogoPreview-${c.id}`),
      $(`editLogoFile-${c.id}`), $(`editLogoRemove-${c.id}`),
      v => { editLogoValues[c.id] = v; }
    );
    if (c.logo_base64) {
      const area = $(`editLogoArea-${c.id}`);
      if (area) area.classList.add('has-image');
    }
  });
}

// ========== インライン編集 ==========
function openInlineEdit(id) {
  if (editingId && editingId !== id) closeInlineEdit(editingId);
  editingId = id;
  render();
  document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('open'));
  const nameInput = $(`editName-${id}`);
  if (nameInput) nameInput.focus();
}

function closeInlineEdit(id) {
  if (editingId === id) editingId = null;
  render();
}

async function saveInlineEdit(id) {
  const name = $(`editName-${id}`).value.trim();
  if (!name) { alert('会社名を入力してください'); return; }
  const data = {
    name,
    address: $(`editAddress-${id}`).value.trim() || null,
    tel: $(`editTel-${id}`).value.trim() || null,
    fax: $(`editFax-${id}`).value.trim() || null,
    email: $(`editEmail-${id}`).value.trim() || null,
    representative_title: $(`editTitle-${id}`).value.trim() || null,
    representative: $(`editPerson-${id}`).value.trim() || null,
    logo_base64: editLogoValues[id] || null,
  };
  showLoading(true);
  try {
    const res = await fetch(`${API}/company_master?id=eq.${id}`, {
      method: 'PATCH', headers: HEADERS, body: JSON.stringify(data)
    });
    if (!res.ok) throw new Error();
    const idx = companies.findIndex(c => c.id === id);
    if (idx !== -1) companies[idx] = { ...companies[idx], ...data };
    editingId = null;
    render();
    showToast('更新しました', 'success');
  } catch {
    showToast('更新に失敗しました', 'error');
  } finally {
    showLoading(false);
  }
}

// ========== 削除 ==========
async function handleDelete(id) {
  if (!confirm('この会社を削除しますか？')) return;
  showLoading(true);
  try {
    const res = await fetch(`${API}/company_master?id=eq.${id}`, { method: 'DELETE', headers: HEADERS });
    if (!res.ok) throw new Error();
    companies = companies.filter(c => c.id !== id);
    if (editingId === id) editingId = null;
    render();
    showToast('削除しました', 'success');
  } catch {
    showToast('削除に失敗しました', 'error');
  } finally {
    showLoading(false);
  }
}

// ========== 追加フォーム ==========
$('addBtn').addEventListener('click', () => {
  $('addFormCard').classList.add('open');
  $('addBtn').style.display = 'none';
  $('addName').focus();
});

$('addCancelBtn').addEventListener('click', () => {
  $('addFormCard').classList.remove('open');
  $('addBtn').style.display = '';
  ['addName','addAddress','addTel','addFax','addEmail','addTitle','addPerson'].forEach(id => $(id).value = '');
  addLogoCtrl.setValue(null);
  addLogoValue = null;
});

$('addSaveBtn').addEventListener('click', async () => {
  const name = $('addName').value.trim();
  if (!name) { alert('会社名を入力してください'); return; }
  const data = {
    name,
    address: $('addAddress').value.trim() || null,
    tel: $('addTel').value.trim() || null,
    fax: $('addFax').value.trim() || null,
    email: $('addEmail').value.trim() || null,
    representative_title: $('addTitle').value.trim() || null,
    representative: $('addPerson').value.trim() || null,
    logo_base64: addLogoValue || null,
    sort_order: companies.length,
  };
  showLoading(true);
  try {
    const res = await fetch(`${API}/company_master`, {
      method: 'POST', headers: HEADERS, body: JSON.stringify(data)
    });
    if (!res.ok) throw new Error();
    const created = await res.json();
    companies.push(created[0] || { ...data, id: Date.now().toString() });
    $('addFormCard').classList.remove('open');
    $('addBtn').style.display = '';
    ['addName','addAddress','addTel','addFax','addEmail','addTitle','addPerson'].forEach(id => $(id).value = '');
    addLogoCtrl.setValue(null);
    addLogoValue = null;
    render();
    showToast('追加しました', 'success');
  } catch {
    showToast('追加に失敗しました', 'error');
  } finally {
    showLoading(false);
  }
});

// ========== 並び順保存 ==========
$('saveOrderBtn').addEventListener('click', async () => {
  showLoading(true);
  try {
    await Promise.all(companies.map((c, i) =>
      fetch(`${API}/company_master?id=eq.${c.id}`, {
        method: 'PATCH', headers: HEADERS, body: JSON.stringify({ sort_order: i })
      })
    ));
    showToast('並び順を保存しました', 'success');
  } catch {
    showToast('保存に失敗しました', 'error');
  } finally {
    showLoading(false);
  }
});

// ========== 初期ロード ==========
async function loadCompanies() {
  showLoading(true);
  try {
    const res = await fetch(`${API}/company_master?order=sort_order.asc,created_at.asc`, { headers: HEADERS });
    if (!res.ok) throw new Error();
    companies = await res.json();
    render();
  } catch {
    showToast('データの読み込みに失敗しました', 'error');
    render();
  } finally {
    showLoading(false);
  }
}

loadCompanies();
</script>
</body>
</html>
