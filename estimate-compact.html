<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>見積（コンパクト）</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Hiragino Sans','Hiragino Kaku Gothic ProN','Yu Gothic','YuGothic','Meiryo',sans-serif;
      font-size: 13px; background: #fff; color: #222;
      display: flex; flex-direction: column; height: 100vh; overflow: hidden;
    }

    /* ══ HEADER ══ */
    .header-bar {
      display: flex; align-items: center; border-bottom: 1px solid #e5e7eb;
      padding: 0 12px; height: 44px; gap: 12px; background: #fff; flex-shrink: 0;
    }
    .hf { display: flex; align-items: center; gap: 5px; }
    .hf-label { color: #6b7280; font-size: 11px; white-space: nowrap; }
    .hf-val   { font-size: 13px; font-weight: 500; color: #111827; white-space: nowrap; }
    .hf-input {
      font-size: 13px; font-weight: 500; color: #111827; font-family: inherit;
      border: 1px solid #e5e7eb; border-radius: 4px; padding: 2px 6px;
      background: #f9fafb; width: 120px; outline: none;
    }
    .hf-input:focus { border-color: #00b27d; background: #fff; }
    .hf-total-label { color: #6b7280; font-size: 11px; white-space: nowrap; margin-left: 16px; }
    .hf-total-val   { font-size: 15px; font-weight: 700; color: #00b27d; white-space: nowrap; }
    .header-actions { margin-left: auto; display: flex; align-items: center; gap: 6px; }
    .btn {
      height: 28px; padding: 0 12px; border-radius: 6px;
      font-size: 12px; font-family: inherit; cursor: pointer; border: none; white-space: nowrap;
    }
    .btn-green   { background: #00b27d; color: #fff; font-weight: 500; }
    .btn-green:hover { background: #009668; }
    .btn-outline { background: #fff; border: 1px solid #e5e7eb; color: #374151; }
    .btn-outline:hover { background: #f9fafb; }

    /* ══ STATUS BAR ══ */
    .status-bar {
      display: flex; align-items: center; padding: 0 12px;
      gap: 10px; border-bottom: 1px solid #e5e7eb;
      background: #f9fafb; flex-shrink: 0; height: 30px;
    }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%; background: #d1d5db; flex-shrink: 0;
      transition: background 0.3s;
    }
    .status-dot.active  { background: #00b27d; }
    .status-dot.updated { background: #f59e0b; }
    .status-dot.error   { background: #ef4444; }
    .status-text { font-size: 11px; color: #6b7280; }
    .master-badge {
      font-size: 11px; padding: 1px 8px; border-radius: 10px;
      background: #e6faf4; color: #00b27d; border: 1px solid #a7f3d0;
    }
    .master-badge.loading { background: #fef3c7; color: #d97706; border-color: #fde68a; }

    /* ══ TABLE ══ */
    .tbl-wrap { flex: 1; overflow: auto; position: relative; min-height: 0; }
    .tbl-container { min-width: max-content; width: max-content; position: relative; }
    .tbl {
      width: max-content; min-width: 100%; border-collapse: separate; border-spacing: 0; table-layout: fixed;
    }
    .tbl thead tr { background: #fff; }
    .tbl thead th {
      position: sticky; top: 0; z-index: 10; background: #fff;
      padding: 7px 6px; font-size: 12px; font-weight: 500; color: #6b7280;
      text-align: center; border-bottom: 2px solid #e53935;
      border-right: 1px solid #f0f0f0; white-space: nowrap; vertical-align: middle;
    }
    .tbl thead th:last-child { border-right: none; }

    /* 列リサイズ */
    .tbl thead th { position: relative; }
    .col-resizer {
      position: absolute; right: 0; top: 0; bottom: 0;
      width: 5px; cursor: col-resize; z-index: 11;
      background: transparent;
    }
    .col-resizer:hover, .col-resizer.dragging { background: #00b27d44; }
    /* 列ドラッグ移動 */
    .col-drag-over { background: #e0f7f4 !important; outline: 2px solid #00a99d; }

    /* ── 行ドラッグ ── */
    .drag-handle {
      cursor: grab; color: #d1d5db; font-size: 13px;
      padding: 0 4px; user-select: none; display: inline-block;
    }
    .drag-handle:hover { color: #9ca3af; }

<script>
'use strict';

/* ════ 定数 ════ */
const UNITS = ['式','m','m²','m³','本','枚','個','台','箱','袋','缶','組','ヶ所','ヶ月','人工','m(H)'];
const CSV_POLL_INTERVAL  = 500;   // CAD→Compact反映間隔（ms）
const AUTO_POLL_INTERVAL = 5000;   // 作図自動検知（ms）
const FENCE_KOJI_NAME   = 'フェンス工事';
const API_BASE = 'http://localhost:8767/api';

// Supabase設定
const SB_URL = 'https://kkxnyszblaveglvlvwie.supabase.co/rest/v1';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtreG55c3pibGF2ZWdsdmx2d2llIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0Nzk5NTUsImV4cCI6MjA4OTA1NTk1NX0.lYWBM0r_NQ1XFWUwKQmiXq3hKRjwHejYcpMjueGUlSs';
const SB_H = {
  'apikey': SB_KEY,
  'Authorization': 'Bearer ' + SB_KEY,
  'Content-Type': 'application/json',
  'Prefer': 'return=representation'
};

/* ════ GUID→名称CSVマッピング ════ */
// CSVフォーマット: guid,name,spec,unit,list_price（1行目はヘッダー）
let _guidMasterMap = {};  // guid → {name, spec, unit, price}

async function loadGuidMaster() {
  // 候補ファイル名を順に試す
  const candidates = ['guid_master.csv', 'schedule.csv', '新規設定.csv'];
  for (const fname of candidates) {
    try {
      const res = await fetch(`${API_BASE.replace('/api', '')}/api/files?path=${encodeURIComponent(fname)}`);
      if (!res.ok) continue;
      const text = await res.text();
      _parseGuidMasterCsv(text);
      const count = Object.keys(_guidMasterMap).length;
      if (count > 0) {
        showToast(`GUIDマスタ読み込み: ${count}件 (${fname})`);
        return;
      }
    } catch(e) {
      console.warn(`[GUIDマスタ] ${fname} スキップ:`, e.message);
    }
  }
}

function _parseGuidMasterCsv(text) {
  _guidMasterMap = {};
  // BOM除去・エンコード正規化
  if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
  const lines = text.split(/[\r\n]+/).filter(l => l.trim());
  if (lines.length < 2) return;

  // 1行目がタイトル行かヘッダー行か判定
  // RIKCADスケジュール出力: 1行目=タイトル, 2行目=ヘッダー
  // 通常CSV: 1行目=ヘッダー
  let headerIdx = 0;
  const firstCols = _csvLine(lines[0]);
  // GUIDらしき列がなければタイトル行と判断して次行をヘッダーとする
  const looksLikeGuid = s => /^[0-9A-Fa-f]{8}-/.test(s.trim());
  if (!firstCols.some(c => /guid|ユニーク|id/i.test(c)) && lines.length > 2) {
    headerIdx = 1;
  }
  const header = _csvLine(lines[headerIdx]);

  // 列インデックスを検索（日本語・英語両対応）
  const iGuid  = header.findIndex(h => /guid|ユニーク|uniqu/i.test(h));
  const iName  = header.findIndex(h => /材質名|名称|name|材料/i.test(h));
  const iSpec  = header.findIndex(h => /外面材質|仕様|spec/i.test(h));
  const iUnit  = header.findIndex(h => /単位|unit/i.test(h));
  const iPrice = header.findIndex(h => /定価|単価|price/i.test(h));

  if (iGuid < 0) {
    // ヘッダーなし・1列目がGUIDと推定
    console.warn('[GUIDマスタ] GUID列が見つからないため1列目をGUIDとして扱います');
  }

  for (let i = headerIdx + 1; i < lines.length; i++) {
    const cols = _csvLine(lines[i]);
    const guidCol = iGuid >= 0 ? iGuid : 0;
    const nameCol = iName >= 0 ? iName : 1;
    const guid = (cols[guidCol] || '').trim().toUpperCase();
    if (!guid || !looksLikeGuid(guid)) continue;

    const name  = (cols[nameCol] || '').trim();
    const spec  = iSpec  >= 0 ? (cols[iSpec]  || '').trim() : '';
    const unit  = iUnit  >= 0 ? (cols[iUnit]  || '').trim() : '';
    const price = iPrice >= 0 ? (cols[iPrice] || '').trim() : '';

    if (!_guidMasterMap[guid]) {
      // 初出のGUID: そのまま登録
      _guidMasterMap[guid] = { name, spec, unit, price };
    } else {
      // 重複GUID: 名称をカンマ区切りで追記（異なる場合のみ）
      const existing = _guidMasterMap[guid];
      if (name && !existing.name.includes(name)) {
        existing.name = existing.name ? existing.name + ', ' + name : name;
      }
      if (spec && !existing.spec.includes(spec)) {
        existing.spec = existing.spec ? existing.spec + ', ' + spec : spec;
      }
    }
  }
  console.log('[GUIDマスタ] 登録件数:', Object.keys(_guidMasterMap).length);
}

function _csvLine(line) {
  const cols = []; let cur = ''; let inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (inQ) {
      if (c === '"' && line[i+1] === '"') { cur += '"'; i++; }
      else if (c === '"') inQ = false;
      else cur += c;
    } else {
      if (c === '"') inQ = true;
      else if (c === ',') { cols.push(cur); cur = ''; }
      else cur += c;
    }
  }
  cols.push(cur);
  return cols;
}

function applyGuidMaster(row) {
  // GUIDがあれば名称・仕様・単価をマスタから補完（未入力の場合のみ）
  if (!row.guid) return row;
  const m = _guidMasterMap[row.guid.toUpperCase()];
  if (!m) return row;
  return {
    ...row,
    name:  row.name  || m.name,
    spec:  row.spec  || m.spec,
    unit:  row.unit  || m.unit  || row.unit,
    price: row.price || m.price,
  };
}

// Chrome拡張機能経由でTapirコマンド送信
function rikcadRequest(type, extra = {}) {
  return new Promise((resolve, reject) => {
    if (!document.documentElement.hasAttribute('data-rikcad-ext')) {
      reject(new Error('Chrome拡張機能が見つかりません'));
      return;
    }
    const reqId = Math.random().toString(36).slice(2);
    const onResponse = e => {
      if (e.detail?.reqId !== reqId) return;
      document.removeEventListener('__rikcad_response', onResponse);
      if (e.detail.ok === false) reject(new Error(e.detail.error || '拡張機能エラー'));
      else resolve(e.detail);
    };
    document.addEventListener('__rikcad_response', onResponse);
    setTimeout(() => {
      document.removeEventListener('__rikcad_response', onResponse);
      reject(new Error('タイムアウト'));
    }, 5000);
    document.dispatchEvent(new CustomEvent('__rikcad_request', { detail: { reqId, type, ...extra } }));
  });
}

          const rows = r.ok ? await r.json() : [];
          rowsByMasterId[item.id] = rows;

          rows.forEach(row => {
            if (row.rikcad_names !== null && row.rikcad_names !== undefined && row.rikcad_names !== '' && row.rikcad_names !== '[]') {
              const parsed = _parseRikcadNames(row.rikcad_names);
              console.log(`[compact] rikcad_names: raw=${JSON.stringify(row.rikcad_names)} → parsed=${JSON.stringify(parsed)} | name=${row.name}`);
            }
          });
        } catch(e) {

        }
      }));

      _masterCache = { items, rowsByMasterId };
      const totalRows = Object.values(rowsByMasterId).reduce((s, arr) => s + arr.length, 0);
      if (badge) { badge.textContent = `マスタ ${items.length}件 (${totalRows}行)`; badge.className = 'master-badge'; }
      console.log('[compact] マスタ読込完了:', items.length, '件', totalRows, '行');
    } catch(e) {

}

/**
 * rikcad_namesカラムから文字列配列を取得（二重エスケープ含む全形式に対応）
 * 実データ例: "[\"ｼﾞｬｽﾃｨ\"]"  → ["ｼﾞｬｽﾃｨ"]  → ["ｼﾞｬｽﾃｨ"]
 */
function _parseRikcadNames(raw) {
  if (raw === null || raw === undefined || raw === '') return [];

  // すでに配列（SupabaseがJSONBをそのままJSオブジェクトで返した場合）
  if (Array.isArray(raw)) return raw.map(s => String(s).trim()).filter(Boolean);

  if (typeof raw !== 'string') return [String(raw).trim()].filter(Boolean);

  let s = raw.trim();
  if (!s || s === '[]' || s === 'null') return [];

  // 最大3回アンラップを試みる（二重・三重エスケープ対応）
  for (let i = 0; i < 3; i++) {
    try {
      const parsed = JSON.parse(s);
      if (Array.isArray(parsed)) {
        // 配列が取れた → 各要素を文字列化して返す
        return parsed.map(x => String(x).trim()).filter(Boolean);
      }
      if (typeof parsed === 'string') {
        // まだ文字列 → もう一段アンラップ
        s = parsed.trim();
        continue;
      }
      // その他の型（数値等）→終了
      return [String(parsed).trim()].filter(Boolean);
    } catch {
      break;
    }
  }

  // JSON.parseで解決できなかった場合：カンマ区切りや単純文字列として扱う
  // 余分なクォートや括弧を除去
  s = s.replace(/^\[|\]$/g, '').trim();                    // [] 除去
  s = s.replace(/^["']|["']$/g, '').trim();                // 外側クォート除去
  if (!s) return [];
  if (s.includes(',')) return s.split(',').map(x => x.replace(/^["']|["']$/g, '').trim()).filter(Boolean);
  return [s];
}

/**
 * RIKCAD材料名からマスタ行を検索（前方一致優先、完全一致を最優先）
 * 戻り値: [ { masterItem, row, parentFolder, grandFolder, score } ]
 *   parentFolder : 直近の親フォルダ行（subcat/cat）
 *   grandFolder  : 親フォルダのさらに親フォルダ行（cat）
 */
function findMasterByRikcadName(rikcadName) {
  if (!_masterCache || !rikcadName) return [];
  const name = rikcadName.trim();
  const results = [];

  for (const item of _masterCache.items) {
    const rows = _masterCache.rowsByMasterId[item.id] || [];
    // folder_id → フォルダ行のマップ
    const folderMap = {};
    rows.filter(r => r.row_type === 'cat' || r.row_type === 'subcat')
        .forEach(r => { if (r.folder_id) folderMap[r.folder_id] = r; });

    for (const row of rows) {
      if (row.row_type === 'cat' || row.row_type === 'subcat') continue;

      const rikcadNames = _parseRikcadNames(row.rikcad_names);
      if (!rikcadNames.length) continue;

      let score = 0;
      for (const rn of rikcadNames) {
        if (!rn) continue;
        if (rn === name) { score = 2; break; }
        if (name.startsWith(rn)) score = Math.max(score, 1);
      }
      if (score === 0) continue;

      // 直近の親フォルダ
      const parentFolder = row.parent_id ? (folderMap[row.parent_id] || null) : null;
      // 親フォルダのさらに親（grandFolder）
      const grandFolder = parentFolder?.parent_id ? (folderMap[parentFolder.parent_id] || null) : null;

      results.push({ masterItem: item, row, parentFolder, grandFolder, score });
    }
  }

  results.sort((a, b) =>
    b.score - a.score ||
    (a.masterItem.sort_order||0) - (b.masterItem.sort_order||0) ||
    (a.row.sort_order||0) - (b.row.sort_order||0)
  );

  if (results.length) {
    console.log(`[compact] findMaster "${name}" → ${results.length}件ヒット (score=${results[0].score})`);
  }
  return results;
}

// 蓄積モード用グローバル変数
let _accumulatedGuids = new Set();  // 取得済みGUID管理
let _folderMap = {};
let _folderSeq = 0;
// フォルダ行の重複防止（マスタフォルダIDごとに1回だけ作成）
let _createdMasterFolders = {};  // "masterId:folderId" → fid

/* ── レベルに対応するCSSクラスを返す（グローバル） ── */
function _folderClass(level) {
  return ['tr-cat','tr-subcat','tr-cat-l2','tr-cat-l3','tr-cat-l4'][Math.min(level, 4)];
}

/* ── フォルダのレベル（深さ）を取得する（グローバル） ── */
function _getFolderLevel(parentFid) {
  if (!parentFid) return 0;
  const all = document.querySelectorAll('#mainTbody tr[data-type="cat"]');
  for (const tr of all) {
    if (tr.dataset.folderId === parentFid) {
      return (parseInt(tr.dataset.level || '0') + 1);
    }
  }
  return 1;
}

function clearTable() {

function renderTable(rows) {
  // マスタがまだ読み込まれていない場合は読み込み完了を待って再実行
  if (!_masterCache && _masterLoadPromise) {
    _masterLoadPromise.then(() => renderTable(rows)).catch(() => _renderTableCore(rows));
    return;
  }
  _renderTableCore(rows);
}

function _renderTableCore(rows) {
  const tbody = document.getElementById('mainTbody');

  /* ── フォルダ行を生成する共通ヘルパー ── */
  function _makeFolderRow(fid, label, level, parentFid) {
    const tr = document.createElement('tr');
    tr.className         = _folderClass(level);
    tr.dataset.type      = 'cat';
    tr.dataset.folderId  = fid;
    tr.dataset.level     = String(level);
    if (parentFid) tr.dataset.parentId = parentFid;
    const indent = `padding-left:${level * 20}px;`;
    tr.innerHTML = `
      <td></td>
      <td colspan="8" style="${indent}">
        <div class="cat-cell">
          <span class="folder-icon"><svg viewBox="0 0 16 16"><path d="M1 4.5A1.5 1.5 0 012.5 3H6l1.5 1.5H13.5A1.5 1.5 0 0115 6v5.5A1.5 1.5 0 0113.5 13h-11A1.5 1.5 0 011 11.5z"/></svg></span>
          <span class="cat-chevron open" onclick="toggleFolder(this)">∨</span>
          <input class="cat-label-input" value="${esc(label)}" title="ダブルクリックで名前を編集" readonly>
        </div>
      </td>
      <td class="col-hm"></td><td class="col-hm"></td><td class="col-hm"></td>
      <td></td>`;
    // ダブルクリックで編集開始
    const inp = tr.querySelector('.cat-label-input');
    inp.addEventListener('dblclick', () => { inp.readOnly = false; inp.focus(); inp.select(); });
    inp.addEventListener('blur', () => { inp.readOnly = true; });
    inp.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === 'Escape') { inp.readOnly = true; inp.blur(); }
    });
    // フォルダ行クリックで選択
    tr.addEventListener('click', e => {
      if (e.target.classList.contains('cat-label-input') && !e.target.readOnly) return;
      if (e.target.classList.contains('cat-chevron')) return;
      document.querySelectorAll('#mainTbody tr[data-type="cat"].folder-selected')
        .forEach(r => r.classList.remove('folder-selected'));
      tr.classList.toggle('folder-selected');
    });
    tr.draggable = true;
    return tr;
  }

  function getOrCreateFolder(kojiName) {
    const key = kojiName || '（未分類）';
    if (_folderMap[key]) return _folderMap[key];
    _folderSeq++;
    const fid = 'cf' + _folderSeq;
    _folderMap[key] = fid;
    const tr = _makeFolderRow(fid, key, 0, null);
    tbody.appendChild(tr);
    return fid;
  }

  // 中間フォルダ（parentFolderの子）を作成
  function getOrCreateSubFolder(key, displayName, parentFid) {
    if (_folderMap[key]) return _folderMap[key];
    _folderSeq++;
    const fid = 'cf' + _folderSeq;
    _folderMap[key] = fid;
    const level = _getFolderLevel(parentFid);
    const tr = _makeFolderRow(fid, displayName, level, parentFid);
    tbody.appendChild(tr);
    return fid;
  }
  const newRows = rows.filter(r => {
    if (!r.guid) return true;
    const key = r.row_sub ? r.guid + ':' + r.row_sub : r.guid;
    if (_accumulatedGuids.has(key)) return false;
    return true;
  });

  if (newRows.length === 0) return;

  const catalogIdx = getCatalogPriceIndex();

  // ── 延長行（row_sub='length'）をGUIDごとにバッファ（描画しない）──
  const lengthQtyByGuid = {};
  newRows.forEach(r => {
    if (r.row_sub === 'length' && r.guid && r.qty !== '' && r.qty != null) {
      lengthQtyByGuid[r.guid] = parseFloat(r.qty);
    }
  });
  // 延長行を除いた行のみ描画
  const renderRows = newRows.filter(r => r.row_sub !== 'length');

  renderRows.forEach(r => {
    if (r.guid) { const key = r.row_sub ? r.guid + ':' + r.row_sub : r.guid; _accumulatedGuids.add(key); }

    // ── まずGUIDマスタで名称を補完（Wall/Slab等はname=""のため先に補完する）
    r = applyGuidMaster(r);

    const csvName  = (r.name || '').trim();
    const csvUnit  = (r.unit || '').trim();
    const guid     = r.guid || '';
    const autoPrice = csvName ? (catalogIdx[csvName] || 0) : 0;
    const lengthQty = guid !== undefined ? lengthQtyByGuid[guid] : undefined;

    // ── Supabaseマスタから前方一致検索（GUIDマスタ補完後の名称で検索）
    const masterMatches = csvName ? findMasterByRikcadName(csvName) : [];

    if (!masterMatches.length) {
      // マスタ未ヒット → そのまま表示
      appendRow(tbody, getOrCreateFolder(r.kojiName), {
        name: csvName, spec: r.spec||'', unit: csvUnit,
        qty: r.qty, price: r.price||'', listPrice: autoPrice || '',
        note: '', guid,
        cadType: r.cadType||'', leaderName: r.leaderName||'', elementId: r.elementId||'',
        fenceRow: r.fenceRow||'', unitAlt: r.unitAlt||'',
      }, false);
      return;
    }

    console.log(`[compact] マスタヒット: "${csvName}" → ${masterMatches.length}件`);

    masterMatches.forEach(({ masterItem, row: mRow, parentFolder, grandFolder }) => {
      const masterUnit = (mRow.unit||'').trim();
      const cadUnit    = csvUnit;

      // ── 数量マッチング判定 ──
      // 単位の正規化（㎡=m²、㎥=m³ など表記ゆれを吸収）
      const normalizeUnit = u => u
        .replace(/㎡/g, 'm²').replace(/㎥/g, 'm³')
        .replace(/M²/gi, 'm²').replace(/M³/gi, 'm³')
        .trim();
      const masterUnitN = normalizeUnit(masterUnit);
      const cadUnitN    = normalizeUnit(cadUnit);

      // 面積系・長さ系・体積系グループ
      const AREA_UNITS   = ['m²', 'm2'];
      const LENGTH_UNITS = ['m', 'm(h)'];
      const VOL_UNITS    = ['m³', 'm3'];

      const inGroup = (u, grp) => grp.some(g => u.toLowerCase() === g.toLowerCase());

      let resolvedQty  = '';
      let resolvedUnit = masterUnit || cadUnit; // 最終的に使う単位

      if (masterUnitN === cadUnitN) {
        resolvedQty = r.qty;
      } else if (inGroup(masterUnitN, AREA_UNITS) && inGroup(cadUnitN, AREA_UNITS)) {
        resolvedQty = r.qty;
        resolvedUnit = masterUnit;
      } else if (inGroup(masterUnitN, VOL_UNITS) && inGroup(cadUnitN, VOL_UNITS)) {
        resolvedQty = r.qty;
        resolvedUnit = masterUnit;
      } else if (inGroup(masterUnitN, LENGTH_UNITS)) {
        // マスタがm系 → 同GUIDの延長行数量を使う（壁の延長行対応）
        if (lengthQty !== undefined && !isNaN(lengthQty)) {
          resolvedQty  = lengthQty;
          resolvedUnit = masterUnit;
        } else if (inGroup(cadUnitN, LENGTH_UNITS)) {
          // CADも長さ系なら直接使う
          resolvedQty  = r.qty;
          resolvedUnit = masterUnit;
        }
      }

      // ── 2階層フォルダを作成 ──
      let fid;
      if (grandFolder && parentFolder) {
        const grandFid = getOrCreateFolder(grandFolder.name || '');
        const parentKey = (grandFolder.name||'') + '§' + (parentFolder.name||'');
        fid = getOrCreateSubFolder(parentKey, parentFolder.name || '', grandFid);
      } else if (parentFolder) {
        fid = getOrCreateFolder(parentFolder.name || '');
      } else {
        fid = getOrCreateFolder(r.kojiName || '');
      }

      appendRow(tbody, fid, {
        name:      mRow.name || csvName,
        spec:      mRow.spec   || r.spec || '',
        unit:      resolvedUnit,
        qty:       resolvedQty,
        listPrice: mRow.list_price  != null && mRow.list_price  !== '' ? mRow.list_price  : (autoPrice || ''),
        unitPrice: mRow.unit_price  != null && mRow.unit_price  !== '' ? mRow.unit_price  : '',
        rate:      mRow.rate        != null && mRow.rate        !== '' ? mRow.rate        : '',
        note:      'RIKCAD材料名：' + csvName,
        guid, cadType: r.cadType||'', leaderName: r.leaderName||'', elementId: r.elementId||'',
      }, true);
    });
  });

  renumberRows();
  updateFooter();
}


// 作図要素種別の日本語変換
function cadTypeLabel(t) { return CAD_TYPE_JP[t] || t || ''; }

/* ════ 行追加ヘルパー ════ */
function appendRow(tbody, fid, d, matched) {
  const tr = createDataRow();
  tr.dataset.parentId = fid;
  if (matched) tr.classList.add('row-new');

  // GUIDを行に保存（CAD連携用）
  if (d.guid)     tr.dataset.guid     = d.guid;
  if (d.fenceRow) tr.dataset.fenceRow = d.fenceRow;

  const tds = tr.querySelectorAll('td');

  // 作図要素種別（列1）
  if (tds[1]) tds[1].textContent = d.leaderName || '';
  if (tds[2]) tds[2].textContent = cadTypeLabel(d.cadType || '');
  if (tds[3]) tds[3].textContent = d.elementId || '';
  setValue(tds[4], 'input', d.name  || '');
  setValue(tds[5], 'input', d.spec  || '');
  if (d.qty !== '' && d.qty != null) {
    const v = parseFloat(d.qty);
    if (!isNaN(v)) setValue(tds[6], 'input', v);
  }
  const ui = tds[7]?.querySelector('.unit-input');
  if (ui) ui.value = d.unit || '式';
  // 定価（列8）
  if (d.listPrice != null && d.listPrice !== '') {
    const v = parseFloat(String(d.listPrice).replace(/[¥￥,\r\n\t ]/g, ''));
    if (!isNaN(v) && v > 0) setValue(tds[8], 'input', v);
  }
  // 掛率%（列9）
  if (d.rate != null && d.rate !== '') {
    const v = parseFloat(String(d.rate));
    if (!isNaN(v) && v > 0) setValue(tds[9], 'input', v);
  }
  // 単価（列10）— unit_priceをここに設定
  if (d.unitPrice != null && d.unitPrice !== '') {
    const v = parseFloat(String(d.unitPrice).replace(/[¥￥,\r\n\t ]/g, ''));
    if (!isNaN(v) && v > 0) {
      setValue(tds[10], 'input', v);
    }
  } else if (d.price != null && d.price !== '') {
    // 後方互換：priceが来た場合も単価列へ
    const v = parseFloat(String(d.price).replace(/[¥￥,\r\n\t ]/g, ''));
    if (!isNaN(v) && v > 0) setValue(tds[10], 'input', v);
  }
  if (d.note) setValue(tds[15], 'input', d.note);
  // IsFence A行: mm/m換算ボタンをメモ欄に追加
  if (d.fenceRow === 'A' && d.unitAlt) {
    tr.dataset.fenceA = '1';
    tr.dataset.unitAlt = d.unitAlt;
    const noteInp = tds[15]?.querySelector('input');
    if (noteInp) {
      const btn = document.createElement('button');
      btn.textContent = 'mm⇔m';
      btn.className = 'btn btn-outline';
      btn.style.cssText = 'height:20px;padding:0 6px;font-size:10px;margin-left:4px;';
      btn.onclick = (e) => { e.stopPropagation(); toggleFenceUnit(tr); };
      tds[15].appendChild(btn);
    }
  }

  // 行クリック → CAD側を選択状態に（Shift対応）
  tr.addEventListener('click', e => selectRowAndCad(tr, e));

  tbody.appendChild(tr);
  _addDragHandle(tr);

  // 計算トリガー：掛率が入っていれば定価×掛率→単価を計算
  const rateInp = tds[9]?.querySelector('input');
  if (rateInp && rateInp.value) {
    calcFromRate(rateInp);
  } else {
    calcRow(tds[6]?.querySelector('input'));
  }
}

function setValue(td, sel, val) {
  const el = td?.querySelector(sel);
  if (el) el.value = val;
}

/* ════ 計算 ════ */
function fmt(n) { return isNaN(n) ? '—' : '¥' + Math.round(n).toLocaleString(); }

function calcRow(inp) {
  if (!inp) return;
  const tr = inp.closest('tr');
  if (!tr) return;
  const cells = [...tr.querySelectorAll('td')];
  const qty    = parseFloat(cells[6]?.querySelector('input')?.value) || 0;
  const uprice = parseFloat(cells[10]?.querySelector('input')?.value) || 0;
  if (cells[11]) cells[11].textContent = (qty && uprice) ? fmt(qty * uprice) : '—';
  updateFooter();
}

function calcFromRate(inp) {
  const cells = [...inp.closest('tr').querySelectorAll('td')];
  const list  = parseFloat(cells[8]?.querySelector('input')?.value) || 0;
  const rate  = parseFloat(inp.value) || 0;
  const uInp  = cells[10]?.querySelector('input');
  if (uInp) { uInp.value = Math.round(list * rate / 100); calcRow(uInp); }
}

function calcFromPrice(inp) {
  const cells = [...inp.closest('tr').querySelectorAll('td')];
  const list  = parseFloat(cells[8]?.querySelector('input')?.value) || 0;
  const price = parseFloat(inp.value) || 0;
  const rInp  = cells[9]?.querySelector('input');
  if (rInp && list > 0) rInp.value = (price / list * 100).toFixed(1);
  calcRow(inp);
}

function calcHmOffer(inp) {
  const cells = [...inp.closest('tr').querySelectorAll('td')];
  const qty   = parseFloat(cells[6]?.querySelector('input')?.value) || 0;
  const hmP   = parseFloat(inp.value);
  if (cells[14]) cells[14].textContent = (!isNaN(hmP) && hmP > 0) ? fmt(hmP * qty) : '—';
}

/* ════ フッター集計 ════ */
function updateFooter() {
  let subtotal = 0;
  document.querySelectorAll('#mainTbody tr[data-type="row"]').forEach(tr => {
    const cells  = [...tr.querySelectorAll('td')];
    const qty    = parseFloat(cells[6]?.querySelector('input')?.value) || 0;
    const uprice = parseFloat(cells[10]?.querySelector('input')?.value) || 0;
    subtotal += qty * uprice;
  });
  const tax   = Math.floor(subtotal * 0.1);
  const total = subtotal + tax;
  document.getElementById('footerSubtotal').textContent = fmt(subtotal);
  document.getElementById('footerTax').textContent      = fmt(tax);
  document.getElementById('footerTotal').textContent    = fmt(total);
  // ヘッダーの提示合計も更新（提示価格の合計＝subtotal）
  const headerTotalEl = document.getElementById('headerTotal');
  if (headerTotalEl) headerTotalEl.textContent = fmt(subtotal);
}

/* ════ 単位コンボ ════ */
function toggleUnit(inp) { inp.nextElementSibling?.classList.toggle('open'); }
function selectUnit(opt, unit) {

/* ════ 連番 ════ */
function renumberRows() {
  let n = 1;
  document.querySelectorAll('#mainTbody tr[data-type="row"]').forEach(tr => {
    const nc = tr.querySelector('.no-col');
    if (!nc) return;
    // ドラッグハンドルspanを保持しつつ番号を更新
    const handle = nc.querySelector('.drag-handle');
    nc.textContent = n++;
    if (handle) nc.insertBefore(handle, nc.firstChild);
  });
}

/* ════ 行選択 → CAD連携（Shift複数選択対応） ════ */
let _selectedRows  = new Set();
let _lastClickedRow = null;  // Shift範囲選択の基点
let _lastCadGuids  = new Set();  // 直前にCADへ送った選択GUID

function syncSelectionToCad() {
  const newGuids = new Set();
  _selectedRows.forEach(tr => { if (tr.dataset.guid) newGuids.add(tr.dataset.guid); });

  const toRemove = [..._lastCadGuids].filter(g => !newGuids.has(g));
  const toAdd    = [...newGuids].filter(g => !_lastCadGuids.has(g));
  if (!toRemove.length && !toAdd.length) return;

  _lastCadGuids = newGuids;
  _lastSelGuids = null;  // 次のポーリングで必ず再評価させる
  rikcadRequest('SET_SELECTION', { removeGuids: toRemove, addGuids: toAdd })
    .then(() => { if (toAdd.length) showToast(`CADで${toAdd.length}件選択しました`); })
    .catch(() => {});
}

function selectRowAndCad(tr, event) {
  const allRows = [...document.querySelectorAll('#mainTbody tr[data-type="row"]')];

  if (event && event.shiftKey && _lastClickedRow && allRows.includes(_lastClickedRow)) {
    // Shift選択: 前回クリック行から今回クリック行までの範囲をすべて選択
    const fromIdx = allRows.indexOf(_lastClickedRow);
    const toIdx   = allRows.indexOf(tr);
    const [start, end] = fromIdx < toIdx ? [fromIdx, toIdx] : [toIdx, fromIdx];

    _selectedRows.forEach(r => { r.classList.remove('row-selected'); r.classList.remove('row-multi-selected'); });
    _selectedRows.clear();
    for (let i = start; i <= end; i++) {
      allRows[i].classList.add('row-selected');
      if (i !== fromIdx) allRows[i].classList.add('row-multi-selected');
      _selectedRows.add(allRows[i]);
    }
  } else {
    // 通常クリック: 単一選択
    _selectedRows.forEach(r => { r.classList.remove('row-selected'); r.classList.remove('row-multi-selected'); });
    _selectedRows.clear();
    tr.classList.add('row-selected');
    _selectedRows.add(tr);
    _lastClickedRow = tr;
  }

  syncSelectionToCad();
}

/* ════ アイコンバー操作 ════ */

function icAddRow() {
  const tbody = document.getElementById('mainTbody');
  const sel   = [..._selectedRows].filter(r => r.dataset.type === 'row');
  const count = sel.length || 1;  // 選択行数、なければ1行

  let anchor = sel.length ? sel[sel.length - 1] : null;
  let firstNew = null;

  for (let i = 0; i < count; i++) {
    const newTr = createDataRow();
    newTr.addEventListener('click', e => selectRowAndCad(newTr, e));
    // 親フォルダを引き継ぐ
    if (anchor && anchor.dataset.parentId) newTr.dataset.parentId = anchor.dataset.parentId;
    if (anchor) {
      anchor.after(newTr);
      anchor = newTr;
    } else {
      tbody.appendChild(newTr);
      anchor = newTr;
    }
    newTr.draggable = true;
    _addDragHandle(newTr);
    if (!firstNew) firstNew = newTr;
  }

  renumberRows();
  updateFooter();
  // 最初の新行の名称欄にフォーカス
  setTimeout(() => firstNew?.querySelector('td:nth-child(5) input')?.focus(), 30);
}

function icAddFolder() {
  const tbody = document.getElementById('mainTbody');
  _folderSeq++;
  const fid = 'manual-f' + _folderSeq;

  // 選択中フォルダがあれば子フォルダとして追加、なければルートに追加
  const selectedFolder = document.querySelector('#mainTbody tr[data-type="cat"].folder-selected');
  const parentFid   = selectedFolder ? (selectedFolder.dataset.folderId || null) : null;
  const parentLevel = selectedFolder ? (parseInt(selectedFolder.dataset.level || '0')) : -1;
  const level       = parentLevel + 1;  // ルートなら 0

  const newFolderTr = document.createElement('tr');
  newFolderTr.className        = _folderClass(level);
  newFolderTr.dataset.type     = 'cat';
  newFolderTr.dataset.folderId = fid;
  newFolderTr.dataset.level    = String(level);
  if (parentFid) newFolderTr.dataset.parentId = parentFid;

  const indent = `padding-left:${level * 20}px;`;
  newFolderTr.innerHTML = `
    <td></td>
    <td colspan="8" style="${indent}">
      <div class="cat-cell">
        <span class="folder-icon"><svg viewBox="0 0 16 16"><path d="M1 4.5A1.5 1.5 0 012.5 3H6l1.5 1.5H13.5A1.5 1.5 0 0115 6v5.5A1.5 1.5 0 0113.5 13h-11A1.5 1.5 0 011 11.5z"/></svg></span>
        <span class="cat-chevron open" onclick="toggleFolder(this)">∨</span>
        <input class="cat-label-input" value="新規フォルダ" title="ダブルクリックで名前を編集">
      </div>
    </td>
    <td class="col-hm"></td><td class="col-hm"></td><td class="col-hm"></td>
    <td></td>`;

  // イベント設定
  _addFolderEvents(newFolderTr);

  // 挿入位置：選択フォルダがあればそのグループの末尾の直後、なければtbody末尾
  if (selectedFolder) {
    // 選択フォルダのグループ末尾を探す
    const groupFids = new Set([selectedFolder.dataset.folderId]);
    let lastInGroup = selectedFolder;
    let next = selectedFolder.nextElementSibling;
    while (next) {
      const pid = next.dataset.parentId;
      const nfid = next.dataset.folderId;
      if (pid && groupFids.has(pid)) {
        lastInGroup = next;
        if (nfid) groupFids.add(nfid);
      } else if (!pid) {
        break;
      }
      next = next.nextElementSibling;
    }
    lastInGroup.after(newFolderTr);
    // 選択解除して新フォルダを選択状態に
    selectedFolder.classList.remove('folder-selected');
  } else {
    const selRows = [..._selectedRows];
    if (selRows.length) {
      selRows[0].before(newFolderTr);
    } else {
      tbody.appendChild(newFolderTr);
    }
  }

  newFolderTr.draggable = true;

  setTimeout(() => {
    const inp = newFolderTr.querySelector('.cat-label-input');
    if (inp) { inp.readOnly = false; inp.focus(); inp.select(); }
  }, 30);
}

function icDeleteRows() {
  const tbody = document.getElementById('mainTbody');

  // 選択済みフォルダ行を収集
  const selectedFolders = [...document.querySelectorAll('#mainTbody tr[data-type="cat"].folder-selected')];
  // 選択済み明細行を収集
  const selectedDataRows = [..._selectedRows].filter(r => r.dataset.type === 'row');

  if (!selectedFolders.length && !selectedDataRows.length) {
    showToast('削除する行またはフォルダをクリックして選択してください');
    return;
  }

  // フォルダ削除：フォルダ+配下の全行を削除
  const toRemove = new Set();
  selectedFolders.forEach(folderTr => {
    toRemove.add(folderTr);
    const fid = folderTr.dataset.folderId;
    if (fid) {
      // 配下行を再帰的に収集
      const groupFids = new Set([fid]);
      tbody.querySelectorAll('tr').forEach(tr => {
        const pid = tr.dataset.parentId;
        const tfid = tr.dataset.folderId;
        if (pid && groupFids.has(pid)) {
          toRemove.add(tr);
          if (tfid) groupFids.add(tfid);
        }
      });
    }
  });

  // 明細行削除
  selectedDataRows.forEach(r => toRemove.add(r));

  const count = toRemove.size;
  toRemove.forEach(r => r.remove());

  _selectedRows.clear();
  _lastClickedRow = null;
  renumberRows();
  updateFooter();
  showToast(`${count}件を削除しました`);
  if (typeof scheduleSave === 'function') scheduleSave();
}

// 手動で現在の選択を取得して追記
/* ════ 作図自動検知 ════ */
let _autoDetectOn   = false;
let _autoDetectTimer = null;
let _knownGuids     = new Set();  // 既知のGUID（スナップショット）

function toggleAutoDetect() {
  _autoDetectOn = !_autoDetectOn;
  const btn = document.getElementById('autoDetectBtn');
  if (_autoDetectOn) {
    btn.textContent = '⚡ 作図自動検知: ON';
    btn.style.color = '#00b27d';
    btn.style.borderColor = '#00b27d';
    fetchSnapshot()
      .then(data => {
        if (data.ok) {
          _knownGuids = new Set(data.guids);
          showToast(`作図自動検知を開始しました（既存${data.count}要素を除外）`);
          _scheduleAutoDetect();
        }
      })
      .catch(() => showToast('サーバー接続エラー'));
  } else {
    btn.textContent = '⚡ 作図自動検知: OFF';
    btn.style.color = '';
    btn.style.borderColor = '';
    if (_autoDetectTimer) clearTimeout(_autoDetectTimer);
    showToast('作図自動検知を停止しました');
  }
}

function _scheduleAutoDetect() {
  if (!_autoDetectOn) return;
  _autoDetectTimer = setTimeout(_runAutoDetect, AUTO_POLL_INTERVAL);
}

function _runAutoDetect() {
  if (!_autoDetectOn) return;
  fetchNewElements(_knownGuids)
    .then(data => {
      if (!data.ok) { _scheduleAutoDetect(); return; }
      if (data.all_guids) _knownGuids = new Set(data.all_guids);
      if (data.has_new && data.rows && data.rows.length > 0) {
        onCsvUpdated(data.rows, 'RIKCAD');
        showToast(`新規作図 ${data.rows.length}要素を自動取得しました`);
      }
      _scheduleAutoDetect();
    })
    .catch(() => _scheduleAutoDetect());
}

function fetchCurrentSelection() {
  _lastElementsHash = null;
  _watchPaused = true;
  showToast('CADの選択要素を取得中...');
  fetchSelectedElements()
    .then(data => {
      console.log('[fetchCurrentSelection] data:', JSON.stringify(data).slice(0, 200));
      if (!data.ok || !data.has_selection) {
        showToast('CADで要素を選択してください');
        return;
      }
      _lastElementsHash = data.hash;
      console.log('[fetchCurrentSelection] rows:', data.rows?.length, data.rows?.[0]);
      if (data.rows && data.rows.length > 0) {
        onCsvUpdated(data.rows, 'RIKCAD');
        const guids = data.rows.map(r => r.guid).filter(Boolean);
        setTimeout(() => highlightRowsByGuids(guids), 50);
      } else {
        showToast('取得できる要素がありませんでした（rows空）');
      }
    })
    .catch(e => { console.error('[fetchCurrentSelection] error:', e); showToast('Tapir接続エラー: ' + e.message); });
}

// CAD選択変化 → 対応する見積行をハイライト
function highlightRowsByGuids(guids) {
  // CAD側の実際の選択状態で _lastCadGuids を更新（syncSelectionToCad の差分計算に使う）
  _lastCadGuids = new Set(guids || []);

  // 全ハイライト解除
  _selectedRows.forEach(r => { r.classList.remove('row-selected'); r.classList.remove('row-multi-selected'); });
  _selectedRows.clear();

  if (!guids || guids.length === 0) return;

  const guidSet = new Set(guids);
  document.querySelectorAll('#mainTbody tr[data-type="row"]').forEach(tr => {
    if (guidSet.has(tr.dataset.guid)) {
      tr.classList.add('row-selected');
      _selectedRows.add(tr);
    }
  });

  // 最初にハイライトされた行までスクロール
  if (_selectedRows.size > 0) {
    const first = [..._selectedRows][0];
    first.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

/* ════ ポーリング：前のリクエスト完了後に次をスケジュール ════ */
let _csvPollTimer     = null;
let _lastElementsHash = null;
let _polling          = false;
let _lastSelGuids     = '';
let _selSyncTimer     = null;

function startCsvPolling() {
  if (_polling) return;
  _polling = true;
  document.getElementById('pollDot').className   = 'status-dot active';
  document.getElementById('pollText').textContent = 'CAD要素監視中（3秒ごと）';
  _scheduleNextPoll(500);
  _scheduleSelSync(1000);
}

function _scheduleNextPoll(delay) {
  if (_csvPollTimer) clearTimeout(_csvPollTimer);
  _csvPollTimer = setTimeout(checkCsvUpdate, delay);
}

// ── CAD選択 → Compact ハイライト同期（1.5秒ごと）──
function _scheduleSelSync(delay) {
  if (_selSyncTimer) clearTimeout(_selSyncTimer);
  _selSyncTimer = setTimeout(_runSelSync, delay);
}

function _runSelSync() {
  fetchSelectedGuids()
    .then(guids => {
      const guidsStr = (guids || []).slice().sort().join(',');
      if (guidsStr !== _lastSelGuids) {
        _lastSelGuids = guidsStr;
        highlightRowsByGuids(guids || []);
      }
      _scheduleSelSync(500);
    })
    .catch(() => _scheduleSelSync(1000));
}

async function checkCsvUpdate() {
  try {
    const data = await fetchSelectedElements();
    if (!data.ok || !data.has_selection) {
      _lastElementsHash = null;
      _scheduleNextPoll(CSV_POLL_INTERVAL);
      return;
    }
    if (data.hash === _lastElementsHash) {
      _scheduleNextPoll(CSV_POLL_INTERVAL);
      return;
    }
    _lastElementsHash = data.hash;
    if (data.rows && data.rows.length > 0) _updateOrAddRows(data.rows);
  } catch(e) {
    document.getElementById('pollDot').className = 'status-dot error';
    document.getElementById('pollText').textContent = 'サーバー接続エラー（再試行中）';
    setTimeout(() => {
      document.getElementById('pollDot').className = 'status-dot active';
      document.getElementById('pollText').textContent = 'CAD要素監視中（3秒ごと）';
    }, 2000);
    _scheduleNextPoll(CSV_POLL_INTERVAL * 2);
    return;
  }
  _scheduleNextPoll(CSV_POLL_INTERVAL);
}

// 既存行はguidで探して数量・仕様を更新、なければ追記
function _updateOrAddRows(rows) {
  let newRows = [];
  rows.forEach(row => {
    if (!row.guid) { newRows.push(row); return; }
    const existing = [...document.querySelectorAll('#mainTbody tr[data-type="row"]')]
      .find(tr => tr.dataset.guid === row.guid &&
            (!row.name || tr.querySelector('td:nth-child(5) input')?.value === row.name));
    if (existing) {
      const qtyInput  = existing.querySelector('td:nth-child(7) input');
      const specInput = existing.querySelector('td:nth-child(6) input');
      if (qtyInput  && row.qty  !== undefined) qtyInput.value  = row.qty;
      if (specInput && row.spec !== undefined) specInput.value = row.spec;
      // 単価×数量を再計算して提示価格を更新
      const priceInput = existing.querySelector('td:nth-child(11) input');
      const dispCell   = existing.querySelector('td:nth-child(12)');
      if (priceInput && qtyInput && dispCell) {
        const p = parseFloat(priceInput.value) || 0;
        const q = parseFloat(qtyInput.value)   || 0;
        dispCell.textContent = (p && q) ? Math.round(p * q).toLocaleString() : '—';
      }
    } else {
      newRows.push(row);
    }
  });
  if (newRows.length > 0) onCsvUpdated(newRows, 'RIKCAD');
}

function onCsvUpdated(rows, filename) {
  renderTable(rows);

  const now = new Date();
  const ts  = `${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
  document.getElementById('pollDot').className       = 'status-dot updated';
  document.getElementById('lastUpdateText').textContent = `最終更新: ${ts}`;
  setTimeout(() => {
    document.getElementById('pollDot').className = 'status-dot active';
  }, 2000);

  showToast(`図面情報を取得・マスタ反映しました（+${rows.length}行）`);
}

// マスタ・カタログからの postMessage 受信
window.addEventListener('message', function(e) {
  // ── 送信元チェック：このウィンドウが開いたポップアップからのメッセージのみ受け付ける ──
  const fromMaster  = _masterPopup  && !_masterPopup.closed  && e.source === _masterPopup;
  const fromCatalog = _catalogPopup && !_catalogPopup.closed && e.source === _catalogPopup;
  if (!fromMaster && !fromCatalog) return;  // 無関係な送信元は無視

  // ── master-popup: 上書き確認 ──
  if (e.data && e.data.type === 'masterItemsCheck') {
    const row = _getSelectedRow();
    const hasData = row
      ? !!(row.querySelectorAll('td')[4]?.querySelector('input')?.value?.trim())
      : false;
    _savedSelRows = row ? [row] : [];
    if (_masterPopup && !_masterPopup.closed) {
      _masterPopup.postMessage({
        type: 'masterItemsCheckResult',
        items: e.data.items,
        hasData: hasData,
        selCount: row ? 1 : 0
      }, '*');
    }
  }
  // ── master-popup: データ受信 ──
  if (e.data && e.data.type === 'masterItems') {
    _insertMasterItems(e.data.items, e.data.mode || 'add', _savedSelRows);
    _savedSelRows = [];
  }
  // ── catalog-popup: 上書き確認 ──
  if (e.data && e.data.type === 'catalogItemsCheck') {
    const row = _getSelectedRow();
    const hasData = row
      ? !!(row.querySelectorAll('td')[4]?.querySelector('input')?.value?.trim())
      : false;
    _savedSelRows = row ? [row] : [];
    if (_catalogPopup && !_catalogPopup.closed) {
      _catalogPopup.postMessage({
        type: 'catalogItemsCheckResult',
        hasData: hasData,
        selCount: row ? 1 : 0
      }, '*');
    }
  }
  // ── catalog-popup: データ受信 ──
  if (e.data && e.data.type === 'catalogItems') {
    _insertCatalogItems(e.data.items, e.data.mode || 'add', _savedSelRows);
    _savedSelRows = [];
  }
});

function _insertMasterItems(items, mode, selRows) {
  const tbody = document.getElementById('mainTbody');
  // フォルダを探す or 末尾に追加
  // 既存の（未分類）フォルダを探すか、onCsvUpdated経由で末尾に追記
  const _existingFolder = [...document.querySelectorAll('#mainTbody tr[data-type="cat"]')]
    .find(tr => (tr.querySelector('.cat-label-input')?.value || tr.querySelector('.cat-label')?.textContent || '').trim() === '（未分類）');
  let fid = selRows[0]?.dataset?.parentId || _existingFolder?.dataset?.folderId || 'cf1';
  let refRow = selRows.length > 0 && mode === 'overwrite' ? selRows[0] : null;

  items.forEach(item => {
    if (refRow && mode === 'overwrite') {
      // 選択行を上書き
      const tds = refRow.querySelectorAll('td');
      tds[4].querySelector('input').value = item.name  || '';
      tds[5].querySelector('input').value = item.spec  || '';
      const ui = tds[7]?.querySelector('.unit-input'); if (ui) ui.value = item.unit || '式';
      const lp = parseFloat(item.listPrice || item.price || ''); 
      if (!isNaN(lp)) tds[8].querySelector('input').value = lp;
      const pp = parseFloat(item.price || '');
      if (!isNaN(pp)) tds[10].querySelector('input').value = pp;
      calcRow(tds[6]?.querySelector('input'));
      refRow.classList.add('row-new');
      refRow = null;
    } else {
      const d = {
        name: item.name || '', spec: item.spec || '',
        unit: item.unit || '式', qty: item.qty || '',
        price: item.price || '', note: item.biko || '',
        cadType: '',
      };
      appendRow(tbody, fid, d, true);
    }
  });
  renumberRows();
  updateFooter();
  showToast(`マスタから${items.length}件追加しました`);
}

function _insertCatalogItems(items, mode, selRows) {
  const tbody = document.getElementById('mainTbody');
  const _existingFolder2 = [...document.querySelectorAll('#mainTbody tr[data-type="cat"]')]
    .find(tr => (tr.querySelector('.cat-label-input')?.value || tr.querySelector('.cat-label')?.textContent || '').trim() === '（未分類）');
  let fid = selRows[0]?.dataset?.parentId || _existingFolder2?.dataset?.folderId || 'cf1';
  let refRow = selRows.length > 0 && mode === 'overwrite' ? selRows[0] : null;

  items.forEach(item => {
    const specText = [item.spec1, item.spec2]
      .filter(s => s && s.trim() && !/^(なし|ナシ|ﾅｼ|-)$/i.test(s.trim())).join(' ');
    if (refRow && mode === 'overwrite') {
      const tds = refRow.querySelectorAll('td');
      tds[4].querySelector('input').value = item.name    || '';
      tds[5].querySelector('input').value = specText;
      const ui = tds[7]?.querySelector('.unit-input'); if (ui) ui.value = item.unit || '式';
      const lp = parseFloat(item.price || '');
      if (!isNaN(lp)) tds[8].querySelector('input').value = lp;
      calcRow(tds[6]?.querySelector('input'));
      refRow.classList.add('row-new');
      refRow = null;
    } else {
      const d = {
        name: item.name || '', spec: specText,
        unit: item.unit || '式', qty: '',
        price: item.price || '', note: item.biko || '',
        cadType: '',
      };
      appendRow(tbody, fid, d, true);
    }
  });
  renumberRows();
  updateFooter();
  showToast(`カタログから${items.length}件追加しました`);
}

// ════ 見積選択モーダル ════
let _estModalProps    = [];
let _estModalEstimates = [];
let _estSelectedPropId = null;
let _estSelectedEstId  = null;

function openEstimateSelectModal() {
  const items = _collectCompactRows();
  if (!items.length) { showToast('転送するデータがありません'); return; }
  // モーダルを表示してから物件一覧を読み込む
  document.getElementById('estModal').style.display = 'flex';
  _estSelectedPropId = null;
  _estSelectedEstId  = null;
  _estModalStep('prop');
  _loadProps();
}

function _collectCompactRows() {
  // フォルダ行（cat）と明細行（row）を順番通りに収集
  const items = [];  // {type:'folder'|'row', ...}
  // folderIdMap: fid → フォルダ名
  const folderNameMap = {};
  document.querySelectorAll('#mainTbody tr[data-type="cat"]').forEach(tr => {
    const fid   = tr.dataset.folderId || '';
    const label = (tr.querySelector('.cat-label-input')?.value || tr.querySelector('.cat-label')?.textContent || '').trim();
    if (fid) folderNameMap[fid] = label;
  });

  // 全行を順番に処理
  document.querySelectorAll('#mainTbody tr').forEach(tr => {
    const type = tr.dataset.type;
    if (type === 'cat') {
      const fid   = tr.dataset.folderId || '';
      const label = (tr.querySelector('.cat-label-input')?.value || tr.querySelector('.cat-label')?.textContent || '').trim();
      items.push({ type: 'folder', fid, name: label });
    } else if (type === 'row') {
      const tds   = [...tr.querySelectorAll('td')];
      const name  = tds[4]?.querySelector('input')?.value?.trim() || '';
      const spec  = tds[5]?.querySelector('input')?.value?.trim() || '';
      const qty   = tds[6]?.querySelector('input')?.value?.trim() || '';
      const unit  = tds[7]?.querySelector('.unit-input')?.value?.trim() || '式';
      const price = tds[8]?.querySelector('input')?.value?.trim() || '';
      const guid  = tr.dataset.guid || '';
      const parentId = tr.dataset.parentId || '';
      if (!name && !qty) return;
      items.push({
        type: 'row',
        name: name || ('要素' + (items.filter(i=>i.type==='row').length + 1)),
        spec, qty, unit, price, guid, parentId
      });
    }
  });
  return items;
}

function _estModalStep(step) {
  document.getElementById('estStepProp').style.display = step === 'prop' ? '' : 'none';
  document.getElementById('estStepEst').style.display  = step === 'est'  ? '' : 'none';
}

async function _loadProps() {
  const list = document.getElementById('estPropList');
  list.innerHTML = '<div style="padding:12px;color:#aaa;">読み込み中...</div>';
  try {
    const r = await fetch(`${SB_URL}/properties?order=created_at.desc&limit=200`, { headers: SB_H });
    _estModalProps = await r.json();
    list.innerHTML = '';
    _estModalProps.forEach(p => {
      const d = document.createElement('div');
      d.className = 'est-list-item';
      d.textContent = p.name || '（名称なし）';
      d.onclick = () => {
        _estSelectedPropId = p.id;
        document.getElementById('estStepEstTitle').textContent = p.name;
        _estModalStep('est');
        _loadEstimates(p.id);
      };
      list.appendChild(d);
    });
    if (!_estModalProps.length) list.innerHTML = '<div style="padding:12px;color:#aaa;">物件がありません</div>';
  } catch(e) {
    list.innerHTML = '<div style="padding:12px;color:#e53935;">読み込みエラー</div>';
  }
}

async function _loadEstimates(propId) {
  const list = document.getElementById('estEstList');
  list.innerHTML = '<div style="padding:12px;color:#aaa;">読み込み中...</div>';
  try {
    const r = await fetch(`${SB_URL}/estimates?property_id=eq.${propId}&order=created_at.asc`, { headers: SB_H });
    _estModalEstimates = await r.json();
    list.innerHTML = '';
    // 新規作成ボタン
    const newBtn = document.createElement('div');
    newBtn.className = 'est-list-item est-list-new';
    newBtn.innerHTML = '<span style="color:#00a99d;font-weight:600;">＋ 新規見積を作成</span>';
    newBtn.onclick = () => _showNewEstForm();
    list.appendChild(newBtn);
    // 既存見積
    _estModalEstimates.forEach(e => {
      const d = document.createElement('div');
      d.className = 'est-list-item';
      d.innerHTML = `<span style="font-weight:500;">${e.plan_name || '（プラン名なし）'}</span>
        <span style="font-size:11px;color:#9ca3af;margin-left:8px;">${e.estimate_no || ''}</span>`;
      d.onclick = () => {
        _estSelectedEstId = e.id;
        document.querySelectorAll('.est-list-item').forEach(x => x.classList.remove('selected'));
        d.classList.add('selected');
        document.getElementById('estConfirmBtn').style.display = '';
        document.getElementById('estNewForm').style.display = 'none';
      };
      list.appendChild(d);
    });
  } catch(e) {
    list.innerHTML = '<div style="padding:12px;color:#e53935;">読み込みエラー</div>';
  }
  document.getElementById('estConfirmBtn').style.display = 'none';
  document.getElementById('estNewForm').style.display = 'none';
}

function _showNewEstForm() {
  document.querySelectorAll('.est-list-item').forEach(x => x.classList.remove('selected'));
  _estSelectedEstId = null;
  document.getElementById('estNewForm').style.display = 'block';
  document.getElementById('estConfirmBtn').style.display = '';
  document.getElementById('estNewPlanName').value = '';
  document.getElementById('estNewNo').value = '';
  setTimeout(() => document.getElementById('estNewPlanName').focus(), 50);
}

function estCloseModal() {
  document.getElementById('estModal').style.display = 'none';
}

async function estConfirm() {
  const items = _collectCompactRows();
  if (!items.length) { showToast('転送するデータがありません'); estCloseModal(); return; }

  let estimateId = _estSelectedEstId;

  // 新規作成
  if (!estimateId) {
    const planName = document.getElementById('estNewPlanName').value.trim();
    const estNo    = document.getElementById('estNewNo').value.trim();
    if (!planName) { showToast('プラン名を入力してください'); return; }
    try {
      const now = new Date().toISOString();
      const r = await fetch(`${SB_URL}/estimates`, {
        method: 'POST', headers: SB_H,
        body: JSON.stringify({
          property_id: _estSelectedPropId,
          plan_name:   planName,
          estimate_no: estNo || null,
          created_at:  now,
          updated_at:  now
        })
      });
      if (!r.ok) throw new Error(await r.text());
      const d = await r.json();
      estimateId = d[0]?.id;
      if (!estimateId) throw new Error('estimate_id取得失敗');
    } catch(e) {
      showToast('見積作成失敗: ' + e.message);
      return;
    }
  }

  // estimate_rowsの現在の最大sort_orderを取得して追記
  let sortBase = 0;
  try {
    const r = await fetch(
      `${SB_URL}/estimate_rows?estimate_id=eq.${estimateId}&order=sort_order.desc&limit=1`,
      { headers: SB_H }
    );
    const existing = await r.json();
    sortBase = existing.length ? (existing[0].sort_order + 1) : 0;
  } catch(e) {}

  // itemsをestimate_rows形式に変換して保存（フォルダ行も含む）
  const fidMap = {};  // compact側fid → estimate_rows用folder_id（genId相当）
  function genFolderId() { return 'f_' + Math.random().toString(36).slice(2,10); }
  const payload = [];
  items.forEach((r, i) => {
    if (r.type === 'folder') {
      const newFid = genFolderId();
      fidMap[r.fid] = newFid;
      payload.push({
        estimate_id: estimateId,
        row_type:    'cat',
        sort_order:  sortBase + i,
        name:        r.name,
        spec:        null, qty: null, unit: null,
        list_price:  null, rate: null, unit_price: null,
        cost:        null, memo: null, note: null,
        folder_id:   newFid,
        parent_id:   null,
        level:       1,
      });
    } else {
      payload.push({
        estimate_id: estimateId,
        row_type:    'row',
        sort_order:  sortBase + i,
        name:        r.name,
        spec:        r.spec      || null,
        qty:         r.qty       ? parseFloat(r.qty) || null : null,
        unit:        r.unit      || '式',
        list_price:  r.price     ? parseFloat(r.price) || null : null,
        rate:        null, unit_price: null, cost: null, memo: null, note: null,
        folder_id:   null,
        parent_id:   r.parentId  ? (fidMap[r.parentId] || null) : null,
        level:       null,
      });
    }
  });

  try {
    const r = await fetch(`${SB_URL}/estimate_rows`, {
      method: 'POST',
      headers: SB_H,
      body: JSON.stringify(payload)
    });
    if (!r.ok) throw new Error(await r.text());
    estCloseModal();

    // 追加した見積のNo・プラン名をヘッダーに反映
    try {
      const estRes = await fetch(`${SB_URL}/estimates?id=eq.${estimateId}`, { headers: SB_H });
      if (estRes.ok) {
        const estData = await estRes.json();
        const est = estData[0];
        if (est) {
          const noEl   = document.getElementById('dispEstimateNo');
          const planEl = document.getElementById('dispPlanName');
          if (noEl   && est.estimate_no) noEl.value   = est.estimate_no;
          if (planEl && est.plan_name)   planEl.value = est.plan_name;
          saveHeaderToLS();
        }
      }
    } catch(e) {}

    showToast(`${payload.length}行を見積に追加しました（フォルダ含む）`);
    saveTableToStorage();  // テーブル内容を保存

    // CAD紐付け：現在開いている.plnファイルのパスをestimatesに保存
    _linkPlnToEstimate(estimateId);
  } catch(e) {
    showToast('保存失敗: ' + e.message);
  }
}

/* ════ ユーティリティ ════ */
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ════ CAD（.pln）↔ 見積 紐付け ════ */

// 現在開いている.plnパスを取得
async function _getPlnPath() {
  try {
    const res = await fetch(`${API_BASE.replace('/api','')}/api/project_info`, { signal: AbortSignal.timeout(2000) });
    if (!res.ok) return null;
    const data = await res.json();
    return data.ok && data.pln_path ? data.pln_path : null;
  } catch(e) {
    return null;
  }
}

// 見積へ追加したときにplnパスをestimatesに保存
async function _linkPlnToEstimate(estimateId) {
  const plnPath = await _getPlnPath();
  if (!plnPath || !estimateId) return;
  try {
    await fetch(`${SB_URL}/estimates?id=eq.${estimateId}`, {
      method: 'PATCH',
      headers: { ...SB_H, 'Content-Type': 'application/json' },
      body: JSON.stringify({ pln_path: plnPath })
    });
    // localStorageにも保存（高速検索用）
    _savePlnLink(plnPath, estimateId);
    console.log(`[CAD紐付け] pln_path保存: ${plnPath} → ${estimateId}`);
  } catch(e) {
    console.warn('[CAD紐付け] 保存失敗:', e);
  }
}

// localStorageにpln→estimate_idのマップを保存
function _savePlnLink(plnPath, estimateId) {
  try {
    const key = 'compactPlnLinks';
    const map = JSON.parse(localStorage.getItem(key) || '{}');
    map[plnPath] = estimateId;
    localStorage.setItem(key, JSON.stringify(map));
  } catch(e) {}
}

// 起動時：現在のplnパスに紐付いた見積を検索してヘッダーに表示
async function _autoDetectLinkedEstimate() {
  const plnPath = await _getPlnPath();
  if (!plnPath) return;

  // まずlocalStorageから高速検索
  try {
    const map = JSON.parse(localStorage.getItem('compactPlnLinks') || '{}');
    if (map[plnPath]) {
      await _applyLinkedEstimate(map[plnPath], plnPath);
      return;
    }
  } catch(e) {}

  // Supabaseから検索（plnパスが一致する見積）
  try {
    const encodedPath = encodeURIComponent(plnPath);
    const res = await fetch(`${SB_URL}/estimates?pln_path=eq.${encodedPath}&order=updated_at.desc&limit=1`, { headers: SB_H });
    if (!res.ok) return;
    const data = await res.json();
    if (data[0]) {
      _savePlnLink(plnPath, data[0].id);
      await _applyLinkedEstimate(data[0].id, plnPath);
    }
  } catch(e) {}
}

// 紐付かった見積の情報をヘッダーに反映
async function _applyLinkedEstimate(estimateId, plnPath) {
  try {
    const res = await fetch(`${SB_URL}/estimates?id=eq.${estimateId}`, { headers: SB_H });
    if (!res.ok) return;
    const data = await res.json();
    const est = data[0];
    if (!est) return;
    const noEl   = document.getElementById('dispEstimateNo');
    const planEl = document.getElementById('dispPlanName');
    if (noEl   && est.estimate_no) noEl.value   = est.estimate_no;
    if (planEl && est.plan_name)   planEl.value = est.plan_name;
    saveHeaderToLS();
    showToast(`📎 図面に紐付いた見積を検出: ${est.plan_name || est.estimate_no || estimateId}`);
    console.log(`[CAD紐付け] 自動検出: ${plnPath} → ${estimateId}`);
  } catch(e) {}
}

    document.querySelectorAll('#mainTbody tr').forEach(tr => {
      const type = tr.dataset.type;
      if (type === 'cat') {
        data.rows.push({

          folderId:  tr.dataset.folderId  || '',
          parentId:  tr.dataset.parentId  || '',
          level:     tr.dataset.level     || '0',

/* ════ 行ドラッグ移動（フォルダごと対応） ════ */
let _rowDragSrc    = null;  // ドラッグ中のtr
let _rowDragGroup  = [];    // フォルダの場合は配下行も含む

function initRowDrag() {
  const tbody = document.getElementById('mainTbody');
  if (!tbody) return;

  function collectFolderGroup(folderTr) {
    const group = [folderTr];
    const fid = folderTr.dataset.folderId;
    if (!fid) return group;
    const groupFids = new Set([fid]);
    let next = folderTr.nextElementSibling;
    while (next) {
      const pid = next.dataset.parentId;
      const nextFid = next.dataset.folderId;
      if (pid && groupFids.has(pid)) {
        group.push(next);
        if (nextFid) groupFids.add(nextFid);
      } else if (!pid) {
        break;
      }
      next = next.nextElementSibling;
    }
    return group;
  }

  // tbody全体でイベント委譲
  tbody.addEventListener('dragstart', e => {
    const tr = e.target.closest('tr');
    if (!tr || !tr.closest('#mainTbody')) return;
    _rowDragSrc = tr;

    // フォルダ行なら配下の行も一緒にドラッグ対象にする
    if (tr.dataset.type === 'cat') {
      _rowDragGroup = collectFolderGroup(tr);
    } else {
      _rowDragGroup = [tr];
    }

    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', '');
    requestAnimationFrame(() => _rowDragGroup.forEach(r => r.classList.add('row-dragging')));
  });

  tbody.addEventListener('dragend', () => {
    _rowDragGroup.forEach(r => r.classList.remove('row-dragging'));
    tbody.querySelectorAll('.row-drop-above,.row-drop-below').forEach(r => {
      r.classList.remove('row-drop-above','row-drop-below');
    });
    _rowDragSrc   = null;
    _rowDragGroup = [];
  });

  tbody.addEventListener('dragover', e => {
    if (!_rowDragSrc) return;
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    const target = e.target.closest('tr');
    if (!target || _rowDragGroup.includes(target)) return;

    tbody.querySelectorAll('.row-drop-above,.row-drop-below').forEach(r => {
      r.classList.remove('row-drop-above','row-drop-below');
    });
    const rect = target.getBoundingClientRect();
    const mid  = rect.top + rect.height / 2;
    target.classList.add(e.clientY < mid ? 'row-drop-above' : 'row-drop-below');
  });

  tbody.addEventListener('dragleave', e => {
    if (!e.relatedTarget || !tbody.contains(e.relatedTarget)) {
      tbody.querySelectorAll('.row-drop-above,.row-drop-below').forEach(r => {
        r.classList.remove('row-drop-above','row-drop-below');
      });
    }
  });

  tbody.addEventListener('drop', e => {
    if (!_rowDragSrc || !_rowDragGroup.length) return;
    e.preventDefault();
    const target = e.target.closest('tr');
    if (!target || _rowDragGroup.includes(target)) return;

    tbody.querySelectorAll('.row-drop-above,.row-drop-below').forEach(r => {
      r.classList.remove('row-drop-above','row-drop-below');
    });

    const rect  = target.getBoundingClientRect();
    const after = e.clientY >= rect.top + rect.height / 2;
    const anchor = after ? target.nextSibling : target;

    // グループ全体を挿入（逆順で insertBefore するため正順でOK）
    if (anchor) {
      _rowDragGroup.forEach(r => tbody.insertBefore(r, anchor));
    } else {
      _rowDragGroup.forEach(r => tbody.appendChild(r));
    }

    renumberRows();
    updateFooter();
    scheduleSave();
  });
}

// No列にドラッグハンドルを表示（createDataRowとフォルダ行に適用）
/* フォルダ行にダブルクリック編集・クリック選択イベントを設定する共通関数 */
function _addFolderEvents(tr) {
  const inp = tr.querySelector('.cat-label-input');
  if (inp) {
    inp.addEventListener('dblclick', () => { inp.readOnly = false; inp.focus(); inp.select(); });
    inp.addEventListener('blur', () => { inp.readOnly = true; });
    inp.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === 'Escape') { inp.readOnly = true; inp.blur(); }
    });
  }
  tr.addEventListener('click', e => {
    if (e.target === inp && inp && !inp.readOnly) return;
    if (e.target.classList.contains('cat-chevron')) return;
    document.querySelectorAll('#mainTbody tr[data-type="cat"].folder-selected')
      .forEach(r => r.classList.remove('folder-selected'));
    tr.classList.toggle('folder-selected');
  });
}

function _addDragHandle(tr) {
  const noCell = tr.querySelector('.no-col') || tr.querySelector('td:first-child');
  if (!noCell) return;
  tr.draggable = true;
  // No列の前にハンドルアイコンを挿入（textContentは renumberRows が上書きするので spanで囲む）
  if (!noCell.querySelector('.drag-handle')) {
    const handle = document.createElement('span');
    handle.className   = 'drag-handle';
    handle.textContent = '⠿';
    handle.title       = 'ドラッグして移動';
    noCell.insertBefore(handle, noCell.firstChild);
  }
}
function initColDragMove() {
  const thead = document.querySelector('#mainTbl thead tr');
  if (!thead) return;
  const cols  = document.querySelectorAll('#mainColgroup col');
  const ths   = [...thead.querySelectorAll('th')];

  // ドラッグ不可の列インデックス（No・引出線・作図要素・要素ID）
  const FIXED_COLS = new Set([0, 1, 2, 3]);
  let dragSrcIdx = null;

  ths.forEach((th, i) => {
    if (FIXED_COLS.has(i)) return;
    th.draggable = true;
    th.style.cursor = 'grab';

    th.addEventListener('dragstart', e => {
      dragSrcIdx = i;
      e.dataTransfer.effectAllowed = 'move';
      th.style.opacity = '0.5';
    });
    th.addEventListener('dragend', () => {
      th.style.opacity = '';
      ths.forEach(t => t.classList.remove('col-drag-over'));
      dragSrcIdx = null;
    });
    th.addEventListener('dragover', e => {
      if (dragSrcIdx === null || dragSrcIdx === i || FIXED_COLS.has(i)) return;
      e.preventDefault();
      ths.forEach(t => t.classList.remove('col-drag-over'));
      th.classList.add('col-drag-over');
    });
    th.addEventListener('drop', e => {
      e.preventDefault();
      if (dragSrcIdx === null || dragSrcIdx === i || FIXED_COLS.has(i)) return;
      ths.forEach(t => t.classList.remove('col-drag-over'));
      _swapCols(dragSrcIdx, i, ths, cols);
      dragSrcIdx = null;
    });
  });
}

function _swapCols(fromIdx, toIdx, ths, cols) {
  const tbody = document.getElementById('mainTbody');
  // colgroup の幅を入れ替え
  if (cols[fromIdx] && cols[toIdx]) {
    const fw = cols[fromIdx].style.width;
    cols[fromIdx].style.width = cols[toIdx].style.width;
    cols[toIdx].style.width = fw;
  }
  // thead の th を移動
  const thRow = ths[0].closest('tr');
  const thArr = [...thRow.querySelectorAll('th')];
  if (fromIdx < toIdx) {
    thRow.insertBefore(thArr[fromIdx], thArr[toIdx].nextSibling);
  } else {
    thRow.insertBefore(thArr[fromIdx], thArr[toIdx]);
  }
  // tbody の各行の td を同様に移動
  tbody.querySelectorAll('tr[data-type="row"]').forEach(tr => {
    const tds = [...tr.querySelectorAll('td')];
    if (!tds[fromIdx] || !tds[toIdx]) return;
    if (fromIdx < toIdx) {
      tr.insertBefore(tds[fromIdx], tds[toIdx].nextSibling);
    } else {
      tr.insertBefore(tds[fromIdx], tds[toIdx]);
    }
  });
}

/* ════ Enterキーで次セルへ移動 ════ */
function initEnterNavigation() {
  const tbody = document.getElementById('mainTbody');
  if (!tbody) return;

  tbody.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    const inp = e.target;
    if (!inp || inp.tagName !== 'INPUT') return;
    if (inp.classList.contains('unit-input')) return;  // 単位コンボは除外
    e.preventDefault();

    const tr   = inp.closest('tr[data-type="row"]');
    if (!tr) return;

    // 同一行内の編集可能inputを順番に取得
    const rowInputs = [...tr.querySelectorAll('input.cell-edit, input.unit-input')]
      .filter(i => !i.readOnly && !i.closest('.col-hm'));
    const curIdx = rowInputs.indexOf(inp);

    if (curIdx >= 0 && curIdx < rowInputs.length - 1) {
      // 同一行の次セル
      rowInputs[curIdx + 1].focus();
      rowInputs[curIdx + 1].select?.();
    } else {
      // 次の明細行の最初のinputへ
      let next = tr.nextElementSibling;
      while (next && next.dataset.type !== 'row') next = next.nextElementSibling;
      if (next) {
        const nextInp = next.querySelector('input.cell-edit');
        if (nextInp) { nextInp.focus(); nextInp.select?.(); }
      } else {
        // 行末かつ最終行 → 新行を追加してフォーカス
        icAddRow();
      }
    }
  });
}

/* ════ 変化検知ウォッチポーリング ════ */
let _watchTimer  = null;
let _watchHashes = {};
const WATCH_INTERVAL = 500;  // 変化検知間隔（ms）
let _watchPaused = false;

function startWatchPolling() {}

function _scheduleWatch(delay) {
  if (_watchTimer) clearTimeout(_watchTimer);
  _watchTimer = setTimeout(_runWatch, delay);
}

async function _runWatch() {
  if (_watchPaused) { _scheduleWatch(WATCH_INTERVAL); return; }
  const guidSet = new Set();
  document.querySelectorAll('#mainTbody tr[data-type="row"]').forEach(tr => {
    if (tr.dataset.guid) guidSet.add(tr.dataset.guid);
  });

  if (guidSet.size === 0) {
    _scheduleWatch(WATCH_INTERVAL);
    return;
  }

  try {
    const res  = await fetch(`${API_BASE}/elements/watch`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ guids: [...guidSet], hashes: _watchHashes }),
    });
    const data = await res.json();
    if (!data.ok) { _scheduleWatch(WATCH_INTERVAL); return; }

    _watchHashes = { ..._watchHashes, ...data.hashes };

    if (data.changed && data.changed.length > 0) {
      _applyWatchedChanges(data.changed);
    }
  } catch(e) {}
  _scheduleWatch(WATCH_INTERVAL);
}

function _applyWatchedChanges(rows) {
  // guid→[row]のマップを作成
  const rowByGuid = {};
  rows.forEach(row => {
    if (!row.guid) return;
    if (!rowByGuid[row.guid]) rowByGuid[row.guid] = [];
    rowByGuid[row.guid].push(row);
  });

  Object.entries(rowByGuid).forEach(([guid, updatedRows]) => {
    const trList = [...document.querySelectorAll(
      `#mainTbody tr[data-type="row"][data-guid="${guid}"]`
    )];
    if (trList.length === 0) return;

    // A行・mai行・通常行を判別して対応するupdatedRowを適用
    trList.forEach(tr => {
      const fenceRow = tr.dataset.fenceRow || '';
      let row;
      if (fenceRow === 'A') {
        row = updatedRows.find(r => r.fenceRow === 'A') || updatedRows[0];
      } else if (fenceRow === 'mai') {
        row = updatedRows.find(r => r.fenceRow === 'mai') || updatedRows[0];
      } else {
        row = updatedRows[0];
      }
      if (!row) return;

      const tds = tr.querySelectorAll('td');

      // 名称（ユーザーが手編集していない場合のみ更新）
      const nameInp = tds[4]?.querySelector('input');
      if (nameInp && !nameInp.dataset.userEdited) {
        nameInp.value = row.name || '';
      }

      // 仕様
      const specInp = tds[5]?.querySelector('input');
      if (specInp && !specInp.dataset.userEdited) {
        specInp.value = row.spec || '';
      }

      // 数量
      const qtyInp = tds[6]?.querySelector('input');
      if (qtyInp && !qtyInp.dataset.userEdited) {
        if (row.qty !== '' && row.qty != null) {
          qtyInp.value = row.qty;
          calcRow(qtyInp);
        }
      }
    });
  });

  const now = new Date();
  const ts  = `${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
  document.getElementById('lastUpdateText').textContent = `変化検知: ${ts}`;
}

/* ════ 列リサイズ（全列対応） ════ */
function initColResize() {
  const cols = document.querySelectorAll('#mainColgroup col');
  const ths  = document.querySelectorAll('#mainTbl thead th');

  ths.forEach((th, i) => {
    if (i === 0) return;  // No列はスキップ
    const resizer = document.createElement('div');
    resizer.className = 'col-resizer';
    th.appendChild(resizer);

    let startX, startW;

    resizer.addEventListener('mousedown', e => {
      e.preventDefault();
      e.stopPropagation();
      startX = e.clientX;
      startW = th.getBoundingClientRect().width;
      resizer.classList.add('dragging');

      function onMove(ev) {
        const newW = Math.max(30, startW + (ev.clientX - startX));
        if (cols[i]) cols[i].style.width = newW + 'px';
        th.style.minWidth = newW + 'px';
        th.style.maxWidth = newW + 'px';
      }
      function onUp() {
        resizer.classList.remove('dragging');
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
      }
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
  });
}

        <button onclick="estCloseModal()" style="padding:7px 20px;border:1px solid #d1d5db;border-radius:5px;background:#fff;cursor:pointer;font-family:inherit;">キャンセル</button>
      </div>
    </div>
    <!-- STEP2: 見積選択 -->
    <div id="estStepEst" style="display:none;flex-direction:column;height:100%;overflow:hidden;flex:1;">
      <div class="est-modal-header">
        <div style="display:flex;align-items:center;gap:8px;">
          <button onclick="_estModalStep('prop');_estSelectedEstId=null;" style="background:none;border:none;cursor:pointer;color:#6b7280;font-size:18px;padding:0;line-height:1;">‹</button>
          <span class="est-modal-title" id="estStepEstTitle">見積を選択</span>
        </div>
        <button class="est-modal-close" onclick="estCloseModal()">×</button>
      </div>
      <div class="est-modal-body" id="estEstList"></div>
      <!-- 新規作成フォーム -->
      <div id="estNewForm">
        <div style="background:#f9fafb;border-radius:6px;padding:12px;">
          <div class="est-new-label">プラン名 <span style="color:#e53935;">*</span></div>
          <input id="estNewPlanName" class="est-new-input" type="text" placeholder="例：基本プラン">
          <div class="est-new-label">見積No（任意）</div>
          <input id="estNewNo" class="est-new-input" type="text" placeholder="例：001">
        </div>
      </div>
      <div class="est-modal-footer">
        <button onclick="_estModalStep('prop')" style="padding:7px 20px;border:1px solid #d1d5db;border-radius:5px;background:#fff;cursor:pointer;font-family:inherit;">戻る</button>
        <button id="estConfirmBtn" onclick="estConfirm()" style="display:none;padding:7px 20px;background:#00a99d;color:#fff;border:none;border-radius:5px;cursor:pointer;font-family:inherit;font-weight:600;">追加する</button>
      </div>
    </div>
  </div>
</div>
</body>
</html>
