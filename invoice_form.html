<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>請求書発行 - 工事収支</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Noto Sans JP', sans-serif; box-sizing: border-box; }
    body { background: #f1f3f5; min-width: 1280px; margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    /* ── ヘッダー ── */
    .top-header { flex-shrink: 0; background: white; border-bottom: 1px solid #e6e9ec; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; height: 56px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); z-index: 10; }

    /* ── 分割レイアウト ── */
    .split-body { flex: 1; display: flex; overflow: hidden; }
    .left-pane  { width: 500px; flex-shrink: 0; overflow-y: auto; background: #f1f3f5; border-left: 1px solid #e0e3e6; padding: 20px 16px 40px; display: flex; flex-direction: column; gap: 14px; order: 2; }
    .right-pane { flex: 1; overflow-y: auto; background: #e8eaed; display: flex; flex-direction: column; align-items: center; padding: 24px 20px 40px; gap: 0; order: 1; }

    /* ── カード ── */
    .card { background: white; border-radius: 8px; box-shadow: 0 0 0 1px #e6e9ec; }
    .card-head { padding: 12px 18px; border-bottom: 1px solid #eef0f2; display: flex; align-items: center; justify-content: space-between; }
    .card-body { padding: 16px 18px; }
    .section-bar { width: 4px; height: 15px; background: #1b7ad0; border-radius: 2px; flex-shrink: 0; }
    .section-label { display: flex; align-items: center; gap: 8px; }

    /* ── ボタン ── */
    .btn-ghost { display:flex;align-items:center;gap:6px;height:36px;padding:0 14px;background:white;border:1px solid #d5dadf;border-radius:6px;font-size:13px;color:#4a5158;cursor:pointer; }
    .btn-ghost:hover { background:#f7f8fa; }
    .btn-primary { display:flex;align-items:center;gap:7px;height:36px;padding:0 18px;background:#1b7ad0;border:1px solid #1b7ad0;border-radius:6px;font-size:13px;color:white;font-weight:500;cursor:pointer; }
    .btn-primary:hover { background:#1668b3; }
    .btn-danger-ghost { display:flex;align-items:center;height:26px;padding:0 8px;background:transparent;border:none;border-radius:4px;font-size:12px;color:#c0392b;cursor:pointer; }
    .btn-danger-ghost:hover { background:#fde8e8; }
    .btn-add-row { display:flex;align-items:center;gap:5px;padding:5px 10px;border:none;background:transparent;color:#1b7ad0;font-size:12px;cursor:pointer;border-radius:5px;font-family:'Noto Sans JP',sans-serif; }
    .btn-add-row:hover { background:#eef5fb; }

    /* 保存分割ボタン */
    .save-wrapper { position:relative;display:inline-flex; }
    .btn-primary-save { display:flex;align-items:center;gap:6px;height:36px;padding:0 14px 0 16px;background:#1b7ad0;border:1px solid #1b7ad0;border-radius:6px 0 0 6px;font-size:13px;color:white;font-weight:500;cursor:pointer;white-space:nowrap; }
    .btn-primary-save:hover { background:#1668b3; }
    .save-arrow { display:flex;align-items:center;justify-content:center;width:26px;height:36px;background:#1565ba;border-left:1px solid #1565ba;border-radius:0 6px 6px 0;cursor:pointer; }
    .save-arrow:hover { background:#1254a3; }
    .save-menu { display:none;position:absolute;top:calc(100% + 5px);right:0;background:white;border:1px solid #d5dadf;border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,0.12);min-width:170px;z-index:200;overflow:hidden; }
    .save-menu.open { display:block; }
    .save-menu-item { display:flex;align-items:center;gap:9px;padding:10px 14px;font-size:13px;color:#2c3137;cursor:pointer;border:none;background:none;width:100%;text-align:left;font-family:'Noto Sans JP',sans-serif; }
    .save-menu-item:hover { background:#f0f6fd;color:#1b7ad0; }
    .save-menu-item+.save-menu-item { border-top:1px solid #eef0f2; }
    .save-menu-item-back { color:#1b7ad0 !important; font-size:11px !important; font-weight:500; }
    .save-menu-item-back:hover { background:#f0f6fd !important; }
    .save-menu-arrow { margin-left:auto; color:#c0c6cc; font-size:11px; }
    .save-menu-divider { height:1px; background:#eef0f2; }
    .save-menu-label { font-size:10px; color:#a6adb4; padding:6px 14px 2px; letter-spacing:0.3px; }

    /* ── フォーム部品 ── */
    .form-label { font-size:11px;font-weight:500;color:#6b7178;margin-bottom:5px;display:block; }
    .form-input { width:100%;height:34px;padding:0 10px;border:1px solid #d5dadf;border-radius:5px;font-size:12px;color:#2c3137;outline:none;font-family:'Noto Sans JP',sans-serif;background:white; }
    .form-input:focus { border-color:#1b7ad0;box-shadow:0 0 0 2px rgba(27,122,208,0.12); }
    .form-select { width:100%;height:34px;padding:0 8px;border:1px solid #d5dadf;border-radius:5px;font-size:12px;color:#2c3137;outline:none;font-family:'Noto Sans JP',sans-serif;background:white;cursor:pointer; }
    .form-select:focus { border-color:#1b7ad0;box-shadow:0 0 0 2px rgba(27,122,208,0.12); }
    .form-textarea { width:100%;padding:8px 10px;border:1px solid #d5dadf;border-radius:5px;font-size:12px;color:#2c3137;outline:none;resize:vertical;font-family:'Noto Sans JP',sans-serif;min-height:64px; }
    .form-textarea:focus { border-color:#1b7ad0;box-shadow:0 0 0 2px rgba(27,122,208,0.12); }
    .detail-input { width:100%;height:30px;padding:0 8px;border:1px solid transparent;border-radius:4px;font-size:12px;color:#2c3137;background:transparent;font-family:'Noto Sans JP',sans-serif;outline:none; }
    .detail-input:focus { border-color:#1b7ad0;background:white;box-shadow:0 0 0 2px rgba(27,122,208,0.10); }
    .detail-input.right { text-align:right; }
    .detail-input::placeholder { color:#c0c6cc; }
    .req { display:inline-block;font-size:9px;font-weight:700;color:white;background:#e53e3e;border-radius:2px;padding:1px 4px;margin-left:4px;vertical-align:middle; }
    .opt { display:inline-block;font-size:9px;color:#a6adb4;border:1px solid #d5dadf;border-radius:2px;padding:1px 4px;margin-left:4px;vertical-align:middle; }

    /* ── プレビュー ── */
    .preview-label { font-size:11px;color:#8a929a;font-weight:500;letter-spacing:0.5px;margin-bottom:10px;display:flex;align-items:center;gap:8px; }
    .preview-label::before,.preview-label::after { content:'';flex:1;height:1px;background:#ccc; }
    .preview-wrap { width:720px;background:white;box-shadow:0 4px 24px rgba(0,0,0,0.18);border-radius:2px; }

    /* ── 請求書プレビュー内スタイル ── */
    .inv { font-family:'Noto Sans JP',sans-serif;color:#1a1a1a;padding:36px 40px; }
    .inv-title { background:#1C3557;color:white;text-align:center;font-size:22px;font-weight:700;padding:14px 0;letter-spacing:4px;margin-bottom:0; }
    .inv-meta { display:flex;justify-content:flex-end;gap:24px;font-size:11px;color:#555;padding:8px 0 16px; }
    .inv-reg { color:#c00;font-weight:500; }
    .inv-parties { display:flex;justify-content:space-between;gap:20px;margin-bottom:18px; }
    .inv-client { flex:1; }
    .inv-client-name { font-size:18px;font-weight:700;border-bottom:2px solid #1C3557;padding-bottom:6px;margin-bottom:8px; }
    .inv-field { font-size:11px;color:#555;margin-bottom:4px;display:flex;gap:6px; }
    .inv-field-label { min-width:60px;color:#888; }
    .inv-issuer { text-align:right;font-size:11px;color:#555;line-height:1.8; }
    .inv-issuer-name { font-size:14px;font-weight:700;color:#1a1a1a; }
    .inv-amount-block { background:#EBF5FF;border:2px solid #1C3557;border-radius:4px;display:flex;align-items:center;justify-content:space-between;padding:14px 20px;margin-bottom:14px; }
    .inv-amount-label { font-size:13px;font-weight:700;color:#1C3557; }
    .inv-amount-value { font-size:24px;font-weight:700;color:#1b7ad0; }
    .inv-stamp { border:1px solid #ccc;border-radius:4px;width:60px;height:60px;display:flex;align-items:center;justify-content:center;font-size:9px;color:#bbb;flex-shrink:0; }
    .inv-totals-bar { display:flex;gap:0;margin-bottom:18px; }
    .inv-total-cell { flex:1;border:1px solid #e0e0e0;padding:8px 12px;display:flex;flex-direction:column;gap:3px; }
    .inv-total-cell-label { font-size:10px;color:#888;font-weight:500; }
    .inv-total-cell-value { font-size:13px;font-weight:700;color:#1a1a1a; }
    .inv-table { width:100%;border-collapse:collapse;font-size:11px;margin-bottom:0; }
    .inv-table th { background:#2E4057;color:white;font-weight:500;padding:7px 10px;text-align:left; }
    .inv-table th.r { text-align:right; }
    .inv-table td { padding:7px 10px;border-bottom:1px solid #eee; }
    .inv-table td.r { text-align:right; }
    .inv-table tr:nth-child(odd) td { background:#F7FBFF; }
    .inv-table tr:nth-child(even) td { background:white; }
    .inv-table tfoot td { font-weight:700;background:#EBF5FF !important;border-top:2px solid #2E4057; }
    .inv-table tfoot .grand td { background:#1C3557 !important;color:white;font-size:13px; }
    .inv-bottom { display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px; }
    .inv-section-head { font-size:10px;font-weight:700;background:#eee;padding:5px 10px;margin-bottom:6px;border-left:3px solid #1b7ad0; }
    .inv-bottom-text { font-size:10px;color:#555;line-height:1.8;padding:0 4px; }
    .inv-tantou { display:flex;gap:0;margin-top:10px; }
    .inv-tantou-label { background:#2E4057;color:white;font-size:10px;font-weight:500;padding:6px 12px;display:flex;align-items:center; }
    .inv-tantou-value { border:1px solid #ccc;flex:1;padding:6px 12px;font-size:11px;min-height:32px; }
  </style>
</head>
<body>

<!-- ══ 固定ヘッダー ══════════════════════════════════════════════ -->
<div class="top-header">
  <div style="display:flex;align-items:center;gap:14px;">
    <button class="btn-ghost" onclick="history.back()">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M8.5 10.5L4.5 6.5L8.5 2.5" stroke="#4a5158" stroke-width="1.3" stroke-linecap="round"/></svg>
      戻る
    </button>
    <div style="width:1px;height:20px;background:#e6e9ec;"></div>
    <div style="font-size:17px;font-weight:700;color:#2c3137;">請求書発行</div>
    <div style="font-size:12px;color:#a6adb4;">田中邸新築外構工事 ／ 工事番号 0000001003001</div>
  </div>
  <div style="display:flex;gap:10px;align-items:center;">
    <!-- 保存ボタン（2段階メニュー） -->
    <div class="save-wrapper" id="sw-header">
      <button class="btn-primary-save" onclick="toggleSaveMenu('sw-header')">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 12h10V5L9.5 2H2v10Z" stroke="white" stroke-width="1.15"/><path d="M4.5 2v3.5H9V2M4.5 8.5H9.5" stroke="white" stroke-width="1.15"/></svg>
        請求書保存
      </button>
      <div class="save-arrow" onclick="toggleSaveMenu('sw-header')">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 3.5L5 6.5L8 3.5" stroke="white" stroke-width="1.3" stroke-linecap="round"/></svg>
      </div>
      <div class="save-menu" id="sm-header" style="min-width:190px;">
        <!-- Step1: 形式選択 -->
        <div id="sp1-header">
          <div class="save-menu-label">保存形式を選択</div>
          <button class="save-menu-item" onclick="showSaveStep2('header','excel')">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><rect x="1.5" y="1.5" width="10" height="10" rx="1" stroke="#1e7e34" stroke-width="1.1"/><path d="M1.5 5h10M1.5 8.5h10M5 1.5v10" stroke="#1e7e34" stroke-width="1.1"/></svg>
            Excel で保存
            <span class="save-menu-arrow">›</span>
          </button>
          <button class="save-menu-item" onclick="showSaveStep2('header','pdf')">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M2 11.5h9V4L8.5 1.5H2v10Z" stroke="#c0392b" stroke-width="1.1"/><path d="M8 1.5V4.5h3" stroke="#c0392b" stroke-width="1.1"/><path d="M4.5 7h1.5c.6 0 1 .4 1 1s-.4 1-1 1H4.5V7Z" stroke="#c0392b" stroke-width="1.1"/></svg>
            PDF で保存
            <span class="save-menu-arrow">›</span>
          </button>
        </div>
        <!-- Step2: 保存先選択 -->
        <div id="sp2-header" style="display:none;">
          <button class="save-menu-item save-menu-item-back" onclick="showSaveStep1('header')">
            ‹ 形式を選択し直す
          </button>
          <div class="save-menu-divider"></div>
          <div class="save-menu-label" id="sp2-label-header">—</div>
          <button class="save-menu-item" onclick="doSave('local','header')">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M2 11h9V5L9 2H2v9Z" stroke="#4a5158" stroke-width="1.1"/><path d="M4 2v3.5H8.5V2M4 8H9" stroke="#4a5158" stroke-width="1.1"/></svg>
            ローカルに保存
          </button>
          <button class="save-menu-item" onclick="doSave('openex','header')">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><circle cx="6.5" cy="6.5" r="5" stroke="#1b7ad0" stroke-width="1.1"/><path d="M4 6.5h5M6.5 4v5" stroke="#1b7ad0" stroke-width="1.1"/></svg>
            OPEN EX へ保存
          </button>
        </div>
      </div>
    </div>
    <!-- 印刷ボタン（Excel/PDF 選択） -->
    <div class="save-wrapper" id="pw-header">
      <button class="btn-primary-save" onclick="togglePrintMenu('pw-header')">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3.5 4.5V1.5h7v3M3.5 10.5H2.5C1.95 10.5 1.5 10.05 1.5 9.5V5.5C1.5 4.95 1.95 4.5 2.5 4.5h9C12.05 4.5 12.5 4.95 12.5 5.5v4c0 .55-.45 1-1 1h-1" stroke="white" stroke-width="1.15"/><path d="M3.5 8h7v4.5h-7V8Z" stroke="white" stroke-width="1.15"/></svg>
        請求書印刷
      </button>
      <div class="save-arrow" onclick="togglePrintMenu('pw-header')">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 3.5L5 6.5L8 3.5" stroke="white" stroke-width="1.3" stroke-linecap="round"/></svg>
      </div>
      <div class="save-menu" id="pm-header" style="min-width:170px;">
        <div class="save-menu-label">出力形式を選択</div>
        <button class="save-menu-item" onclick="selectPrintFormat('excel')">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><rect x="1.5" y="1.5" width="10" height="10" rx="1" stroke="#1e7e34" stroke-width="1.1"/><path d="M1.5 5h10M1.5 8.5h10M5 1.5v10" stroke="#1e7e34" stroke-width="1.1"/></svg>
          Excel で出力
        </button>
        <button class="save-menu-item" onclick="selectPrintFormat('pdf')">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M3.5 4.5V1.5h7v3M3.5 10.5H2.5C1.95 10.5 1.5 10.05 1.5 9.5V5.5C1.5 4.95 1.95 4.5 2.5 4.5h9C12.05 4.5 12.5 4.95 12.5 5.5v4c0 .55-.45 1-1 1h-1" stroke="#4a5158" stroke-width="1.1"/><path d="M3.5 8h7v4.5h-7V8Z" stroke="#4a5158" stroke-width="1.1"/></svg>
          PDF で印刷
        </button>
      </div>
    </div>
  </div>
</div>

<!-- ══ 左右分割エリア ══════════════════════════════════════════ -->
<div class="split-body">

  <!-- ── 左：入力フォーム ────────────────────────────────── -->
  <div class="left-pane">

    <!-- 基本情報 -->
    <div class="card">
      <div class="card-head">
        <div class="section-label">
          <div class="section-bar"></div>
          <span style="font-size:14px;font-weight:700;color:#2c3137;">基本情報</span>
        </div>
      </div>
      <div class="card-body" style="display:grid;grid-template-columns:1fr 1fr;gap:14px 16px;">
        <div>
          <label class="form-label">請求 No <span class="req">必須</span></label>
          <input class="form-input" id="invoice-no" type="text" placeholder="例：INV-2026-001" value="INV-2026-001" oninput="updatePreview()">
        </div>
        <div>
          <label class="form-label">発行日 <span class="req">必須</span></label>
          <input class="form-input" id="issue-date" type="date" value="2026-06-23" onchange="updatePreview()">
        </div>
        <div>
          <label class="form-label">請求先 <span class="req">必須</span></label>
          <input class="form-input" id="client-name" type="text" placeholder="会社名・氏名" value="田中　太郎" oninput="updatePreview()">
        </div>
        <div>
          <label class="form-label">敬称 <span class="req">必須</span></label>
          <select class="form-select" id="honorific" onchange="updatePreview()">
            <option value="様" selected>様</option>
            <option value="御中">御中</option>
            <option value="殿">殿</option>
            <option value="各位">各位</option>
          </select>
        </div>
        <div>
          <label class="form-label">支払期限 <span class="opt">任意</span></label>
          <input class="form-input" id="due-date" type="date" onchange="updatePreview()">
        </div>
        <div>
          <label class="form-label">営業担当 <span class="req">必須</span></label>
          <input class="form-input" id="sales-person" type="text" placeholder="担当者名" value="高木 太郎" oninput="updatePreview()">
        </div>
      </div>
    </div>

    <!-- 請求明細 -->
    <div class="card">
      <div class="card-head">
        <div class="section-label">
          <div class="section-bar"></div>
          <span style="font-size:14px;font-weight:700;color:#2c3137;">請求明細</span>
        </div>
        <span style="font-size:11px;color:#a6adb4;">消費税率 10%</span>
      </div>
      <div style="overflow-x:auto;">
        <table style="width:100%;border-collapse:collapse;min-width:440px;">
          <thead>
            <tr style="background:#f7f8fa;">
              <th style="text-align:left;font-size:11px;font-weight:500;color:#8a929a;padding:8px 8px 8px 16px;width:42%;">項目名</th>
              <th style="text-align:right;font-size:11px;font-weight:500;color:#8a929a;padding:8px;width:9%;">数量</th>
              <th style="text-align:left;font-size:11px;font-weight:500;color:#8a929a;padding:8px;width:8%;">単位</th>
              <th style="text-align:right;font-size:11px;font-weight:500;color:#8a929a;padding:8px;width:18%;">単価（税抜）</th>
              <th style="text-align:right;font-size:11px;font-weight:500;color:#8a929a;padding:8px 14px 8px 8px;width:18%;">金額（税抜）</th>
              <th style="width:36px;"></th>
            </tr>
          </thead>
          <tbody id="detail-tbody">
            <tr class="detail-row" style="border-top:1px solid #eef0f2;">
              <td style="padding:4px 6px 4px 10px;"><input class="detail-input" type="text" placeholder="項目名を入力" oninput="updatePreview()"></td>
              <td style="padding:4px 6px;"><input class="detail-input right" type="number" placeholder="1" min="0" oninput="calcRow(this)"></td>
              <td style="padding:4px 6px;"><input class="detail-input" type="text" placeholder="式" oninput="updatePreview()"></td>
              <td style="padding:4px 6px;"><input class="detail-input right unit-price" type="number" placeholder="0" min="0" oninput="calcRow(this)"></td>
              <td style="padding:4px 6px 4px 6px;"><input class="detail-input right row-amount" type="text" readonly style="color:#6b7178;background:#f9fafb;border-color:transparent;cursor:default;"></td>
              <td style="text-align:center;"><button class="btn-danger-ghost" onclick="removeRow(this)">✕</button></td>
            </tr>
            <tr class="detail-row" style="border-top:1px solid #eef0f2;">
              <td style="padding:4px 6px 4px 10px;"><input class="detail-input" type="text" placeholder="項目名を入力" oninput="updatePreview()"></td>
              <td style="padding:4px 6px;"><input class="detail-input right" type="number" placeholder="1" min="0" oninput="calcRow(this)"></td>
              <td style="padding:4px 6px;"><input class="detail-input" type="text" placeholder="式" oninput="updatePreview()"></td>
              <td style="padding:4px 6px;"><input class="detail-input right unit-price" type="number" placeholder="0" min="0" oninput="calcRow(this)"></td>
              <td style="padding:4px 6px;"><input class="detail-input right row-amount" type="text" readonly style="color:#6b7178;background:#f9fafb;border-color:transparent;cursor:default;"></td>
              <td style="text-align:center;"><button class="btn-danger-ghost" onclick="removeRow(this)">✕</button></td>
            </tr>
          </tbody>
          <tbody>
            <tr style="border-top:1px solid #eef0f2;">
              <td colspan="6" style="padding:3px 6px;">
                <button class="btn-add-row" onclick="addDetailRow()">

振込手数料はご負担くださいますようお願い致します。</textarea>

          <!-- Step1: 形式選択 -->

            <button class="save-menu-item" onclick="showSaveStep2('bottom','pdf')">

              ローカルに保存

              <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><circle cx="6.5" cy="6.5" r="5" stroke="#1b7ad0" stroke-width="1.1"/><path d="M4 6.5h5M6.5 4v5" stroke="#1b7ad0" stroke-width="1.1"/></svg>
              OPEN EX へ保存

      <!-- 印刷ボタン（Excel/PDF 選択） -->

          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3.5 4.5V1.5h7v3M3.5 10.5H2.5C1.95 10.5 1.5 10.05 1.5 9.5V5.5C1.5 4.95 1.95 4.5 2.5 4.5h9C12.05 4.5 12.5 4.95 12.5 5.5v4c0 .55-.45 1-1 1h-1" stroke="white" stroke-width="1.15"/><path d="M3.5 8h7v4.5h-7V8Z" stroke="white" stroke-width="1.15"/></svg>

        <div class="save-arrow" onclick="togglePrintMenu('pw-bottom')">
          <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 3.5L5 6.5L8 3.5" stroke="white" stroke-width="1.3" stroke-linecap="round"/></svg>

<script>
// ── 銀行情報マスタ ─────────────────────────────────────────────
const BANKS = {
  bank1: { line1:'〇〇銀行　○○○○支店', line2:'（普通）　0000000', name:'株式会社○○○○○', kana:'カブシキガイシャ○○○○○' },
  bank2: { line1:'〇〇銀行　○○○○支店', line2:'（普通）　0000001', name:'株式会社○○○○○', kana:'カブシキガイシャ○○○○○' },
};

// ── 明細行追加 ─────────────────────────────────────────────────
function addDetailRow() {
  const tbody = document.getElementById('detail-tbody');
  const tr = document.createElement('tr');
  tr.className = 'detail-row';
  tr.style.borderTop = '1px solid #eef0f2';
  tr.innerHTML = `
    <td style="padding:4px 6px 4px 10px;"><input class="detail-input" type="text" placeholder="項目名を入力" oninput="updatePreview()"></td>
    <td style="padding:4px 6px;"><input class="detail-input right" type="number" placeholder="1" min="0" oninput="calcRow(this)"></td>
    <td style="padding:4px 6px;"><input class="detail-input" type="text" placeholder="式" oninput="updatePreview()"></td>
    <td style="padding:4px 6px;"><input class="detail-input right unit-price" type="number" placeholder="0" min="0" oninput="calcRow(this)"></td>
    <td style="padding:4px 6px;"><input class="detail-input right row-amount" type="text" readonly style="color:#6b7178;background:#f9fafb;border-color:transparent;cursor:default;"></td>
    <td style="text-align:center;"><button class="btn-danger-ghost" onclick="removeRow(this)">✕</button></td>
  `;
  tbody.appendChild(tr);
}

function removeRow(btn) { btn.closest('tr').remove(); recalcTotals(); updatePreview(); }

// ── 行計算 ────────────────────────────────────────────────────
function calcRow(input) {
  const tr = input.closest('tr');
  const qty   = parseFloat(tr.querySelectorAll('input[type="number"]')[0]?.value) || 0;
  const price = parseFloat(tr.querySelector('.unit-price')?.value) || 0;
  const amount = qty * price;
  tr.querySelector('.row-amount').value = amount > 0 ? fmt(amount) : '';
  recalcTotals();
  updatePreview();
}

function recalcTotals() {
  let sub = 0;
  document.querySelectorAll('.detail-row').forEach(tr => {
    const qty   = parseFloat(tr.querySelectorAll('input[type="number"]')[0]?.value) || 0;
    const price = parseFloat(tr.querySelector('.unit-price')?.value) || 0;
    sub += qty * price;
  });
  const tax = Math.floor(sub * 0.1);
  document.getElementById('subtotal').textContent   = '¥' + fmt(sub);
  document.getElementById('tax-amount').textContent = '¥' + fmt(tax);
  document.getElementById('total-incl').textContent = '¥' + fmt(sub + tax);
}

function fmt(n) { return Math.round(n).toLocaleString('ja-JP'); }

// ── 振込先セレクト ─────────────────────────────────────────────
function onBankSelect() {
  const val = document.getElementById('bank-select').value;
  const detail = document.getElementById('bank-detail');
  const custom = document.getElementById('bank-custom');
  if (val === 'custom') {
    detail.style.display = 'none'; custom.style.display = 'block';
  } else if (BANKS[val]) {
    const b = BANKS[val];
    detail.innerHTML = `<div>${b.line1}</div><div>${b.line2}</div><div>口座名義：${b.name}</div><div style="color:#a6adb4;font-size:10px;">${b.kana}</div>`;
    detail.style.display = 'block'; custom.style.display = 'none';
  } else {
    detail.style.display = 'none'; custom.style.display = 'none';
  }
  updatePreview();
}

// ── メニュー制御 ──────────────────────────────────────────────
const _saveFmt = {};

function closeAllMenus() { document.querySelectorAll('.save-menu').forEach(m => m.classList.remove('open')); }
document.addEventListener('click', e => { if (!e.target.closest('.save-wrapper')) closeAllMenus(); });

function toggleSaveMenu(wid) {
  const loc    = wid === 'sw-header' ? 'header' : 'bottom';
  const menuId = wid === 'sw-header' ? 'sm-header' : 'sm-bottom';
  const menu   = document.getElementById(menuId);
  const wasOpen = menu.classList.contains('open');
  closeAllMenus();
  if (!wasOpen) { showSaveStep1(loc); menu.classList.add('open'); }
}

function togglePrintMenu(wid) {
  const menuId = wid === 'pw-header' ? 'pm-header' : 'pm-bottom';
  const menu   = document.getElementById(menuId);
  const wasOpen = menu.classList.contains('open');
  closeAllMenus();
  if (!wasOpen) menu.classList.add('open');
}

function showSaveStep1(loc) {
  document.getElementById(`sp1-${loc}`).style.display = 'block';
  document.getElementById(`sp2-${loc}`).style.display = 'none';
}

function showSaveStep2(loc, fmt) {
  _saveFmt[loc] = fmt;
  document.getElementById(`sp1-${loc}`).style.display = 'none';
  document.getElementById(`sp2-${loc}`).style.display = 'block';
  document.getElementById(`sp2-label-${loc}`).textContent =
    fmt === 'excel' ? 'Excel の保存先を選択' : 'PDF の保存先を選択';
}

function doSave(dest, loc) {
  closeAllMenus();
  showSaveStep1(loc);
  const d = collectData();
  if (!validate(d)) return;
  const fmt = _saveFmt[loc] || 'pdf';
  if (fmt === 'excel') {
    dest === 'local' ? downloadExcel(d) : uploadExcelToOpenEX(d);
  } else {
    dest === 'local' ? savePdfLocal(d) : savePdfToOpenEX(d);
  }
}

function selectPrintFormat(fmt) {
  closeAllMenus();
  const d = collectData();
  if (!validate(d)) return;
  fmt === 'excel' ? downloadExcel(d) : window.print();
}

// ── 保存・印刷実行 ────────────────────────────────────────────
function downloadExcel(d) {
  alert('Excel出力\n\n請求No：' + d.invoiceNo + '\n合計（税込）：¥' + fmt(d.total) + '\n\n※ Excel生成はサーバー連携が必要です。');
}
function savePdfLocal(d)       { alert('PDF保存（ローカル）\n\nブラウザの印刷ダイアログから「PDFに保存」を選択してください。'); window.print(); }
function savePdfToOpenEX(d)    { alert('PDFをOPEN EXへ保存しました。\n請求No：' + d.invoiceNo + '\n合計（税込）：¥' + fmt(d.total)); }
function uploadExcelToOpenEX(d){ alert('ExcelをOPEN EXへ保存しました。\n請求No：' + d.invoiceNo + '\n合計（税込）：¥' + fmt(d.total)); }

// ── 後方互換（削除済み参照の保護） ───────────────────────────
function closeSaveMenus() { closeAllMenus(); }

// ── 保存・印刷 ────────────────────────────────────────────────
function collectData() {
  const rows = [];
  document.querySelectorAll('.detail-row').forEach(tr => {
    const inputs = tr.querySelectorAll('input');
    const name  = inputs[0].value.trim();
    const qty   = parseFloat(inputs[1].value) || 0;
    const unit  = inputs[2].value.trim();
    const price = parseFloat(inputs[3].value) || 0;
    if (name || price) rows.push({ name, qty, unit, price, amount: qty * price });
  });
  const sub = rows.reduce((s, r) => s + r.amount, 0);
  const tax = Math.floor(sub * 0.1);
  return {
    invoiceNo:   document.getElementById('invoice-no').value.trim(),
    issueDate:   document.getElementById('issue-date').value,
    dueDate:     document.getElementById('due-date').value,
    clientName:  document.getElementById('client-name').value.trim(),
    honorific:   document.getElementById('honorific').value,
    salesPerson: document.getElementById('sales-person').value.trim(),
    bankVal:     document.getElementById('bank-select').value,
    remarks:     document.getElementById('remarks').value.trim(),
    rows, sub, tax, total: sub + tax,
  };
}

function validate(d) {
  if (!d.invoiceNo)   { alert('請求Noを入力してください。'); return false; }
  if (!d.issueDate)   { alert('発行日を入力してください。'); return false; }
  if (!d.clientName)  { alert('請求先を入力してください。'); return false; }
  if (!d.salesPerson) { alert('営業担当を入力してください。'); return false; }
  if (!d.bankVal)     { alert('振込先を選択してください。'); return false; }
  if (d.rows.length === 0 || d.sub === 0) { alert('請求明細を1件以上入力してください。'); return false; }
  return true;
}

function saveInvoice() { toggleSaveMenu('sw-header'); }

// ── プレビュー生成 ────────────────────────────────────────────
function bankHtml(val) {
  if (val === 'custom') return document.getElementById('bank-custom-text')?.value || '（未入力）';
  if (BANKS[val]) {
    const b = BANKS[val];
    return `${b.line1}<br>${b.line2}<br>口座名義：${b.name}<br><span style="color:#a6adb4;font-size:10px;">${b.kana}</span>`;
  }
  return '（未選択）';
}

function fmtDate(s) {
  if (!s) return '　　　年　　月　　日';
  const [y,m,d] = s.split('-');
  return `${y}年${parseInt(m)}月${parseInt(d)}日`;
}

function updatePreview() {
  const d = collectData();
  const sub = d.sub, tax = d.tax, total = d.total;

  // 明細行HTML
  const detailRows = d.rows.map(r => `
    <tr>
      <td>${escHtml(r.name)}</td>
      <td class="r">${r.qty ? fmt(r.qty) : ''}</td>
      <td>${escHtml(r.unit)}</td>
      <td class="r">${r.price ? '¥'+fmt(r.price) : ''}</td>
      <td class="r">${r.amount ? '¥'+fmt(r.amount) : ''}</td>
      <td class="r">${r.amount ? '¥'+fmt(Math.floor(r.amount*0.1)) : ''}</td>
      <td class="r">${r.amount ? '¥'+fmt(r.amount+Math.floor(r.amount*0.1)) : ''}</td>
    </tr>`).join('');

  // 空行補充（最低4行）
  const emptyCount = Math.max(0, 4 - d.rows.length);
  const emptyRows = Array(emptyCount).fill(`
    <tr><td>&nbsp;</td><td></td><td></td><td></td><td></td><td></td><td></td></tr>`).join('');

  document.getElementById('invoice-preview').innerHTML = `
<div class="inv">
  <div class="inv-title">御　請　求　書</div>

  <div class="inv-meta">
    <span>No. ${escHtml(d.invoiceNo)||'―'}</span>
    <span>発行日：${fmtDate(d.issueDate)}</span>
    <span class="inv-reg">登録番号：T0000000000000</span>
  </div>

  <div class="inv-parties">
    <div class="inv-client">
      <div class="inv-client-name">${escHtml(d.clientName)||'（請求先未入力）'}　${escHtml(d.honorific)}</div>
      <div class="inv-field"><span class="inv-field-label">工事名称</span><span>田中邸新築外構工事</span></div>
      <div class="inv-field"><span class="inv-field-label">工事番号</span><span>0000001003001</span></div>
      <div class="inv-field"><span class="inv-field-label">支払期限</span><span>${fmtDate(d.dueDate)}</span></div>
    </div>
    <div class="inv-issuer">
      <div class="inv-issuer-name">株式会社○○○○○○</div>
      <div>〒000-0000</div>
      <div>○○県○○市○○○○○○</div>
      <div>TEL. 000-0000-0000　FAX. 000-0000-0000</div>
    </div>
  </div>

  <div style="display:flex;gap:12px;align-items:stretch;margin-bottom:14px;">
    <div class="inv-amount-block" style="flex:1;">
      <div>
        <div class="inv-amount-label">御請求金額（税込）</div>
        <div class="inv-amount-value">¥${fmt(total)}</div>
      </div>
    </div>
    <div class="inv-stamp">社　印</div>
  </div>

  <div class="inv-totals-bar">
    <div class="inv-total-cell">
      <div class="inv-total-cell-label">工期代金　(A)</div>
      <div class="inv-total-cell-value">¥${fmt(total)}</div>
    </div>
    <div class="inv-total-cell" style="border-left:none;">
      <div class="inv-total-cell-label">既 入 金　(B)</div>
      <div class="inv-total-cell-value">¥0</div>
    </div>
    <div class="inv-total-cell" style="border-left:none;">
      <div class="inv-total-cell-label">残　金  (A)－(B)</div>
      <div class="inv-total-cell-value">¥${fmt(total)}</div>
    </div>
  </div>

  <table class="inv-table">
    <thead>
      <tr>
        <th style="width:32%;">項目名</th>
        <th class="r" style="width:7%;">数量</th>
        <th style="width:6%;">単位</th>
        <th class="r" style="width:14%;">単価（税抜）</th>
        <th class="r" style="width:14%;">金額（税抜）</th>
        <th class="r" style="width:13%;">消費税(10%)</th>
        <th class="r" style="width:14%;">金額（税込）</th>
      </tr>
    </thead>
    <tbody>${detailRows}${emptyRows}</tbody>
    <tfoot>
      <tr><td colspan="4" class="r">小計（税抜）</td><td class="r">¥${fmt(sub)}</td><td></td><td></td></tr>
      <tr><td colspan="4" class="r">消費税（10%）</td><td></td><td class="r">¥${fmt(tax)}</td><td></td></tr>
      <tr class="grand"><td colspan="5" class="r" style="font-size:12px;">合　計（税込）</td><td colspan="2" class="r" style="font-size:14px;">¥${fmt(total)}</td></tr>
    </tfoot>
  </table>

  <div class="inv-tantou" style="margin-top:10px;">
    <div class="inv-tantou-label">担 当 者</div>
    <div class="inv-tantou-value">${escHtml(d.salesPerson)}</div>
  </div>

  <div class="inv-bottom">
    <div>
      <div class="inv-section-head">■ 備　考</div>
      <div class="inv-bottom-text">${escHtml(d.remarks).replace(/\n/g,'<br>')}</div>
    </div>
    <div>
      <div class="inv-section-head">■ 振 込 先</div>
      <div class="inv-bottom-text">${bankHtml(d.bankVal)}</div>
    </div>
  </div>

  <div style="margin-top:12px;font-size:9px;color:#aaa;text-align:right;">
    ※ 消費税率：10%（軽減税率対象外）　本書は適格請求書（インボイス）に対応しています。
  </div>
</div>`;
}

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// 初期化
onBankSelect();
updatePreview();
</script>
